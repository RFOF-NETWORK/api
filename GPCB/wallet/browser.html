<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>GPCB | Wallet Terminal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { color-scheme: dark; --bg:#020306; --border:#1f2933; --text:#38bdf8; }
    body { margin:0; font-family: 'Courier New', monospace; background:var(--bg); color:var(--text); padding:20px; }
    .terminal { background:#000; border:1px solid var(--border); border-radius:8px; padding:20px; height: calc(100vh - 40px); overflow-y:auto; border-left: 3px solid var(--text); }
    .line { margin-bottom:6px; font-size:12px; }
    .cmd { color:#f1f5f9; }
    .gold { color:#fbbf24; }
  </style>
</head>
<body>
<div class="terminal" id="term">
  <div class="line">[GPCB-WALLET-OS] Establishing link to Master-Root...</div>
  <div class="line">[INFO] Sektor-Check: /GPCB/ detected.</div>
  <div class="line">[INFO] Monitoring Institutionelle Gebühren-Sperren.</div>
  <div class="line">--------------------------------------------------</div>
  <div class="line cmd">GPCB:\WALLET\> <span style="animation: blink 1s infinite;">_</span></div>
</div>

<script>
  const term = document.getElementById("term");
  function addLog(msg) {
    const div = document.createElement("div");
    div.className = "line";
    div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
    term.insertBefore(div, term.lastElementChild);
    term.scrollTop = term.scrollHeight;
  }

  // Master-Brücke: Simuliert Verbindung zur Root-Konsole
  window.addEventListener('message', (e) => {
    addLog("<span class='gold'>MASTER-SIGNAL:</span> " + e.data);
  });

  setInterval(() => {
    if(Math.random() > 0.9) addLog("Audit: 45% SAFE Bestände deckungsgleich mit Kachel J.");
  }, 5000);
</script>
<style> @keyframes blink { 50% { opacity:0; } } </style>
</body>
</html>
