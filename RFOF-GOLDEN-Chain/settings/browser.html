<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>RFOF-GOLDEN-Chain | Config Terminal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root { color-scheme: dark; --bg:#010409; --border:#30363d; --text:#58a6ff; }
    body { margin:0; font-family: 'Courier New', monospace; background:var(--bg); color:var(--text); padding:20px; }
    .terminal { background:#000; border:1px solid var(--border); border-radius:8px; padding:20px; height: calc(100vh - 40px); overflow-y:auto; border-right: 3px solid var(--text); }
    .line { margin-bottom:6px; font-size:12px; }
    .sys { color:#7d8590; }
    .warn { color:#d29922; }
  </style>
</head>
<body>
<div class="terminal" id="term">
  <div class="line sys">[CHAIN-CONFIG] Accessing Protocol Layer...</div>
  <div class="line">[INFO] Verifying Consensus-Parameters.</div>
  <div class="line warn">[SECURITY] Protocol modification restricted to Master-Level.</div>
  <div class="line">--------------------------------------------------</div>
  <div class="line sys">CHAIN:\SETTINGS\> <span style="animation: blink 1s infinite;">_</span></div>
</div>

<script>
  const term = document.getElementById("term");
  function addLog(msg) {
    const div = document.createElement("div");
    div.className = "line";
    div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
    term.insertBefore(div, term.lastElementChild);
    term.scrollTop = term.scrollHeight;
  }

  setInterval(() => {
    if(Math.random() > 0.9) {
      addLog("HEALTH-CHECK: Block propagation and Fee-Logic in sync.");
    }
  }, 7000);
</script>
<style> @keyframes blink { 50% { opacity:0; } } </style>
</body>
</html>
