openapi: 3.1.0
info:
  title: Accounts Module API
  version: 1.0.0
  description: >
    OpenAPI-Spezifikation für das Accounts-Modul.
    Dieses Modul umfasst Accounts, Kontotypen, Salden,
    sowie zugehörige Aktionen und Ereignisse.
    Die Struktur ist deterministisch, modular und vollständig auditierbar.

paths:

  /rpc/create_account:
    post:
      summary: Account erstellen
      operationId: create_account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                in_owner_user_id:
                  type: string
                  format: uuid
                in_account_type:
                  type: string
                in_currency:
                  type: string
              required:
                - in_owner_user_id
                - in_account_type
      responses:
        '200':
          description: Account-ID
          content:
            application/json:
              schema:
                type: string
                format: uuid

  /rpc/close_account:
    post:
      summary: Account schließen
      operationId: close_account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                in_account_id:
                  type: string
                  format: uuid
              required:
                - in_account_id
      responses:
        '200':
          description: Erfolg oder nicht möglich
          content:
            application/json:
              schema:
                type: boolean

  /rpc/freeze_account:
    post:
      summary: Account einfrieren
      operationId: freeze_account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                in_account_id:
                  type: string
                  format: uuid
              required:
                - in_account_id
      responses:
        '200':
          description: Erfolg oder bereits eingefroren
          content:
            application/json:
              schema:
                type: boolean

components:

  schemas:

    Account:
      type: object
      properties:
        id:
          type: string
          format: uuid
        owner_user_id:
          type: string
          format: uuid
        account_number:
          type: string
        account_type:
          type: string
        status:
          type: string
        currency:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AccountBalance:
      type: object
      properties:
        id:
          type: string
          format: uuid
        account_id:
          type: string
          format: uuid
        balance:
          type: number
        updated_at:
          type: string
          format: date-time

    AccountType:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        category:
          type: string
        is_credit_allowed:
          type: boolean
        is_debit_allowed:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
