<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>RFOF-NETWORK – API Explorer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif; background:#0a0a0a; color:#f5f5f5; }
    header { padding:20px; border-bottom:1px solid #222; background:#0a0a0a; display:flex; justify-content:space-between; align-items:center; }
    h1 { margin:0; font-size:20px; }
    a { color:#38bdf8; text-decoration:none; }
    a:hover { text-decoration:underline; }
    #container { padding:20px; }
    .item { padding:10px; border:1px solid #222; border-radius:8px; margin-bottom:8px; background:#111; cursor:pointer; }
    .item:hover { background:#1a1a1a; }
    pre { white-space:pre-wrap; background:#111; padding:12px; border-radius:8px; border:1px solid #222; overflow-x:auto; }
    .path { font-size:12px; color:#888; margin-bottom:10px; }
    .back { margin-bottom:20px; display:inline-block; }
  </style>
</head>
<body>

<header>
  <h1>API Explorer</h1>
  <nav>
    <a href="index.html">Startseite</a> |
    <a href="frontend.md">Frontend</a>
  </nav>
</header>

<div id="container">
  <div id="content"></div>
</div>

<script>
const owner = "RFOF-NETWORK";
const repo = "api";
const apiBase = `https://api.github.com/repos/${owner}/${repo}/contents`;

async function loadPath(path = "") {
  const res = await fetch(`${apiBase}/${path}`);
  const data = await res.json();

  const content = document.getElementById("content");
  content.innerHTML = "";

  if (path !== "") {
    const backPath = path.split("/").slice(0, -1).join("/");
    content.innerHTML += `<a class="back" href="#" onclick="loadPath('${backPath}')">← Zurück</a>`;
    content.innerHTML += `<div class="path">/${path}</div>`;
  }

  if (Array.isArray(data)) {
    data.forEach(item => {
      const div = document.createElement("div");
      div.className = "item";
      div.textContent = item.name;

      if (item.type === "dir") {
        div.onclick = () => loadPath(item.path);
      } else {
        div.onclick = () => loadFile(item.path);
      }

      content.appendChild(div);
    });
  }
}

async function loadFile(path) {
  const res = await fetch(`${apiBase}/${path}`);
  const data = await res.json();

  const content = document.getElementById("content");
  content.innerHTML = `
    <a class="back" href="#" onclick="loadPath('${path.split("/").slice(0, -1).join("/")}')">← Zurück</a>
    <div class="path">/${path}</div>
    <pre id="fileContent">Lade Datei...</pre>
  `;

  const decoded = atob(data.content.replace(/\n/g, ""));
  document.getElementById("fileContent").textContent = decoded;
}

loadPath();
</script>

</body>
</html>
