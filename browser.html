<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>RFOF‑NETWORK – API Explorer & Clearing Console</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>

  <style>
    :root {
      color-scheme: dark;
      --bg:#05060a;
      --bg-alt:#0f1117;
      --border:#1f2933;
      --text:#f9fafb;
      --muted:#9ca3af;
      --accent:#38bdf8;
      --error-bg:#330000;
      --error-border:#ff6b6b;
    }
    body {
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header {
      padding:14px 20px;
      border-bottom:1px solid var(--border);
      background:#020308;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:16px;
      flex-wrap:wrap;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .brand { font-weight:600; font-size:15px; }
    .brand a { color:var(--text); text-decoration:none; }
    .brand span { color:var(--accent); }

    nav { display:flex; flex-wrap:wrap; gap:8px; }
    .nav-group { position:relative; }
    .nav-btn {
      background:#0f172a;
      color:var(--text);
      border:1px solid #111827;
      padding:6px 12px;
      border-radius:999px;
      font-size:13px;
      cursor:pointer;
      display:flex;
      align-items:center;
      gap:6px;
    }
    .nav-menu {
      position:absolute;
      top:110%;
      right:0;
      min-width:180px;
      background:var(--bg-alt);
      border:1px solid var(--border);
      border-radius:10px;
      padding:6px;
      box-shadow:0 18px 40px rgba(0,0,0,.55);
      display:none;
      z-index:120;
    }
    .nav-menu a {
      display:block;
      padding:6px 8px;
      border-radius:6px;
      font-size:13px;
      color:var(--text);
      text-decoration:none;
    }
    .nav-menu a:hover { background:rgba(148,163,184,.15); }
    .nav-group.open .nav-menu { display:block; }

    #container { padding:20px; max-width: 1200px; margin: 0 auto; }

    .guci-bar {
      background: #020617;
      border: 1px solid var(--border);
      padding: 8px 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      font-size: 12px;
      display: flex;
      justify-content: space-between;
      color: var(--muted);
    }
    .guci-bar span { color: var(--accent); font-family: monospace; }

    .path { font-size:12px; color:var(--muted); margin-bottom:10px; font-family: monospace; }
    .item {
      padding:10px;
      border:1px solid var(--border);
      border-radius:8px;
      margin-bottom:8px;
      background:var(--bg-alt);
      cursor:pointer;
      transition: 0.2s;
    }
    .item:hover { border-color: var(--accent); background:rgba(56, 189, 248, 0.05); }

    #apiTester {
      margin-top:40px;
      padding:20px;
      background:var(--bg-alt);
      border-radius:14px;
      border:1px solid var(--border);
    }
    h2 { margin:0 0 15px; font-size:18px; }

    input, textarea, select {
      width:100%;
      padding:10px;
      margin-bottom:10px;
      border-radius:6px;
      border:1px solid var(--border);
      background:var(--bg);
      color:var(--text);
      font-size:14px;
    }

    button.primary {
      padding:10px 20px;
      background:var(--accent);
      border:none;
      border-radius:6px;
      cursor:pointer;
      color:#000;
      font-weight:bold;
    }

    #clearingViewer {
      margin-top: 20px;
      display: none; 
      background: #000;
      border: 1px solid #0f172a;
      padding: 15px;
      border-radius: 10px;
      font-family: monospace;
      font-size: 12px;
      max-height: 300px;
      overflow-y: auto;
      border-left: 3px solid var(--accent);
    }
    .block-entry { color: #4ade80; margin-bottom: 5px; border-bottom: 1px solid #1e293b; padding-bottom: 2px; }
    .energy-val { color: var(--accent); }

    .error {
      color:var(--error-border);
      padding:10px;
      border:1px solid var(--error-border);
      border-radius:8px;
      background:var(--error-bg);
      margin-bottom:20px;
    }
  </style>
</head>

<body>

<header>
  <div class="brand" id="browserBrand">
    <a href="index.html"><span>RFOF‑NETWORK</span> · API Explorer</a>
  </div>

  <nav>
    <div class="nav-group">
      <button class="nav-btn" data-menu="meta">Meta‑Navigation <span class="icon">▾</span></button>
      <div class="nav-menu">
        <a href="index.html">API HOME</a>
        <hr style="border:0; border-top:1px solid var(--border); margin:4px 0;">
        <a href="GPCB/index.html">GPCB</a>
        <a href="ECCU/index.html">ECCU</a>
        <a href="RFOF-GOLDEN-Chain/index.html">RFOF‑GOLDEN‑Chain</a>
        <hr style="border:0; border-top:1px solid var(--border); margin:4px 0;">
        <a href="wallet/index.html">Wallet</a>
        <a href="profil/index.html">Profil</a>
        <a href="settings/index.html">Settings</a>
        <a href="staking/index.html">Staking</a>
      </div>
    </div>
  </nav>
</header>

<div id="container">
  <div class="guci-bar">
    <div>GUCI: <span id="display-guci">...loading</span></div>
    <div>ENERGIE: <span id="display-joul">0</span> Joul</div>
  </div>

  <div id="content">
    <div class="path" id="current-path">ROOT /</div>
    <div id="file-list">Lade Repository Daten...</div>
  </div>

  <div id="apiTester">
    <h2>Box I: Meta‑Documentation Console</h2>
    <input id="apiUrl" placeholder="Endpoint URL (e.g. /actions/transfer)" />
    <select id="apiMethod">
      <option>GET</option>
      <option>POST</option>
      <option>PUT</option>
      <option>DELETE</option>
    </select>
    <textarea id="apiBody" rows="4" placeholder='{"action": "sync", "data": "..."}'></textarea>
    <button class="primary" onclick="executeAction()">Action ausführen</button>
  </div>

  <div id="clearingViewer">
    <div style="color:var(--muted); margin-bottom:10px;">[BOX J] LIVE CHAIN CLEARING MONITOR...</div>
    <div id="clearing-log"></div>
  </div>
</div>

<script>
const owner = "RFOF-NETWORK";
const repo = "api";
const apiBase = `https://api.github.com/repos/${owner}/${repo}/contents`;

let energyCounter = parseInt(localStorage.getItem("totalJoul") || "0");

function updateEnergy(amount = 1) {
    energyCounter += amount;
    localStorage.setItem("totalJoul", energyCounter);
    document.getElementById("display-joul").textContent = energyCounter;
}

function getGUCI() {
    let id = localStorage.getItem("globalClientID");
    if(!id) {
        id = "GUCI-" + Math.random().toString(36).substr(2, 9).toUpperCase();
        localStorage.setItem("globalClientID", id);
    }
    document.getElementById("display-guci").textContent = id;
    return id;
}

async function loadPath(path = "") {
    try {
        const res = await fetch(`${apiBase}/${path}`);
        if (!res.ok) throw new Error(`Fetch Error: ${res.status}`);
        const data = await res.json();
        const list = document.getElementById("file-list");
        document.getElementById("current-path").textContent = `PATH: /${path}`;
        list.innerHTML = "";
        data.forEach(item => {
            const div = document.createElement("div");
            div.className = "item";
            div.textContent = (item.type === "dir" ? "📁 " : "📄 ") + item.name;
            div.onclick = () => item.type === "dir" ? loadPath(item.path) : loadFile(item.path);
            list.appendChild(div);
        });
        updateEnergy(1);
    } catch (err) {
        document.getElementById("file-list").innerHTML = `<div class="error">${err.message}</div>`;
    }
}

async function loadFile(path) {
    const res = await fetch(`${apiBase}/${path}`);
    const data = await res.json();
    const decoded = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ""))));
    const list = document.getElementById("file-list");
    list.innerHTML = `<div class="item" onclick="loadPath('${path.split("/").slice(0,-1).join("/")}')">← Schließen</div><pre><code class="language-javascript">${decoded}</code></pre>`;
    hljs.highlightAll();
    updateEnergy(2);
}

function executeAction() {
    const method = document.getElementById("apiMethod").value;
    const log = document.getElementById("clearing-log");
    const viewer = document.getElementById("clearingViewer");
    viewer.style.display = "block";
    const timestamp = new Date().toLocaleTimeString();
    const blockHash = "0x" + Math.random().toString(16).slice(2, 10);
    const entry = document.createElement("div");
    entry.className = "block-entry";
    entry.innerHTML = `[${timestamp}] <span class="energy-val">VALIDATED</span> | METHOD: ${method} | HASH: ${blockHash} | <span class="energy-val">+5 Joul</span>`;
    log.prepend(entry);
    updateEnergy(5);
}

document.querySelectorAll('.nav-btn').forEach(btn => {
    btn.addEventListener('click', (e) => {
        e.stopPropagation();
        btn.parentElement.classList.toggle('open');
    });
});

document.addEventListener('click', () => {
    document.querySelectorAll('.nav-group').forEach(g => g.classList.remove('open'));
});

window.onload = () => {
    getGUCI();
    loadPath();
    document.getElementById("display-joul").textContent = energyCounter;
    const user = localStorage.getItem("rfof_user");
    if(user) {
      const brand = document.getElementById("browserBrand");
      brand.innerHTML += ` <span style="font-size:10px; color:var(--muted); font-weight:normal;">[OP: ${user}]</span>`;
    }
};
</script>
</body>
</html>
