<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>RFOF‑NETWORK – API Explorer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Syntax Highlighting -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>

  <!-- Markdown Renderer -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/12.0.1/marked.min.js"></script>

  <style>
    :root {
      color-scheme: dark;
      --bg:#0a0a0a;
      --bg-alt:#111;
      --border:#222;
      --text:#f5f5f5;
      --muted:#888;
      --accent:#38bdf8;
      --error-bg:#330000;
      --error-border:#ff6b6b;
    }
    body.light {
      --bg:#f5f5f5;
      --bg-alt:#ffffff;
      --border:#ddd;
      --text:#111;
      --muted:#555;
      --accent:#2563eb;
      --error-bg:#ffe5e5;
      --error-border:#dc2626;
    }

    body {
      margin:0;
      font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
      background:var(--bg);
      color:var(--text);
    }

    header {
      padding:20px;
      border-bottom:1px solid var(--border);
      background:var(--bg);
      display:flex;
      justify-content:space-between;
      align-items:center;
    }

    h1 { margin:0; font-size:20px; }
    a { color:var(--accent); text-decoration:none; }
    a:hover { text-decoration:underline; }

    #container { padding:20px; }

    .item {
      padding:10px;
      border:1px solid var(--border);
      border-radius:8px;
      margin-bottom:8px;
      background:var(--bg-alt);
      cursor:pointer;
    }
    .item:hover { background:rgba(255,255,255,0.05); }

    pre {
      white-space:pre-wrap;
      background:var(--bg-alt);
      padding:12px;
      border-radius:8px;
      border:1px solid var(--border);
      overflow-x:auto;
    }

    .path { font-size:12px; color:var(--muted); margin-bottom:10px; }
    .back { margin-bottom:20px; display:inline-block; }

    .error {
      color:var(--error-border);
      padding:10px;
      border:1px solid var(--error-border);
      border-radius:8px;
      background:var(--error-bg);
      margin-bottom:20px;
      white-space:pre-wrap;
    }

    /* API Tester */
    #apiTester {
      margin-top:40px;
      padding:20px;
      background:var(--bg-alt);
      border-radius:10px;
      border:1px solid var(--border);
    }
    #apiTester h2 { margin-top:0; }

    #apiTester input,
    #apiTester textarea,
    #apiTester select {
      width:100%;
      padding:10px;
      margin-bottom:10px;
      border-radius:6px;
      border:1px solid var(--border);
      background:var(--bg);
      color:var(--text);
      font-family:inherit;
      font-size:14px;
    }

    #apiTester button {
      padding:10px 16px;
      background:var(--accent);
      border:none;
      border-radius:6px;
      cursor:pointer;
      color:#000;
      font-weight:bold;
      margin-right:8px;
      margin-top:4px;
    }

    #apiTester button.secondary {
      background:transparent;
      color:var(--accent);
      border:1px solid var(--accent);
    }

    #apiResponse {
      margin-top:20px;
      background:var(--bg-alt);
      padding:12px;
      border-radius:8px;
      border:1px solid var(--border);
      overflow-x:auto;
      max-height:400px;
    }

    /* Tabs */
    .tabs {
      display:flex;
      gap:8px;
      margin-bottom:10px;
      border-bottom:1px solid var(--border);
    }
    .tab {
      padding:6px 10px;
      cursor:pointer;
      border-radius:6px 6px 0 0;
      border:1px solid transparent;
      border-bottom:none;
      font-size:13px;
    }
    .tab.active {
      border-color:var(--border);
      background:var(--bg);
    }
    .tab-content { display:none; }
    .tab-content.active { display:block; }

    /* Dark mode toggle */
    #themeToggle {
      padding:6px 10px;
      border-radius:6px;
      border:1px solid var(--border);
      background:var(--bg-alt);
      color:var(--text);
      cursor:pointer;
      font-size:13px;
    }

    code.hljs { background:transparent; }
  </style>
</head>

<body>

<header>
  <h1>META Documentation</h1>
  <button id="themeToggle" onclick="toggleTheme()">Dark/Light</button>
</header>

<div id="container">
  <div id="content"></div>

  <!-- Sichtbarer API Tester -->
  <div id="apiTester">
    <h2>API‑Tester</h2>

    <div class="tabs">
      <div class="tab active" data-tab="requestTab">Request</div>
      <div class="tab" data-tab="responseTab">Response</div>
    </div>

    <div id="requestTab" class="tab-content active">
      <label>URL</label>
      <input id="apiUrl" placeholder="https://api.example.com/endpoint" />

      <label>Methode</label>
      <select id="apiMethod">
        <option>GET</option>
        <option>POST</option>
        <option>PUT</option>
        <option>DELETE</option>
        <option>PATCH</option>
      </select>

      <label>Body (JSON, optional)</label>
      <textarea id="apiBody" rows="6" placeholder='{"key":"value"}'></textarea>

      <button onclick="sendApiRequest()">Senden</button>
      <button class="secondary" onclick="clearApi()">Leeren</button>
    </div>

    <div id="responseTab" class="tab-content">
      <pre id="apiResponse">Noch keine Anfrage gesendet.</pre>
    </div>
  </div>
</div>

<script>
/* Theme */
function toggleTheme() {
  document.body.classList.toggle('light');
}

/* Tabs */
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => {
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    tab.classList.add('active');
    document.getElementById(tab.dataset.tab).classList.add('active');
  });
});

/* GitHub API Explorer */
const owner = "RFOF-NETWORK";
const repo = "api";
const apiBase = `https://api.github.com/repos/${owner}/${repo}/contents`;

async function loadPath(path = "") {
  try {
    const res = await fetch(`${apiBase}/${path}`);
    if (!res.ok) throw new Error(`GitHub API Fehler: ${res.status}`);
    const data = await res.json();

    const content = document.getElementById("content");
    content.innerHTML = "";

    if (path !== "") {
      const backPath = path.split("/").slice(0, -1).join("/");
      content.innerHTML += `<a class="back" href="#" onclick="loadPath('${backPath}')">← Zurück</a>`;
      content.innerHTML += `<div class="path">/${path}</div>`;
    }

    if (Array.isArray(data)) {
      data.forEach(item => {
        const div = document.createElement("div");
        div.className = "item";
        div.textContent = item.name;

        if (item.type === "dir") {
          div.onclick = () => loadPath(item.path);
        } else {
          div.onclick = () => loadFile(item.path);
        }

        content.appendChild(div);
      });
    }
  } catch (err) {
    showError(err.message);
  }
}

async function loadFile(path) {
  try {
    const res = await fetch(`${apiBase}/${path}`);
    if (!res.ok) throw new Error(`GitHub API Fehler: ${res.status}`);
    const data = await res.json();

    const content = document.getElementById("content");
    const backPath = path.split("/").slice(0, -1).join("/");

    content.innerHTML = `
      <a class="back" href="#" onclick="loadPath('${backPath}')">← Zurück</a>
      <div class="path">/${path}</div>
      <div id="fileContent">Lade Datei...</div>
    `;

    const decoded = decodeURIComponent(escape(atob(data.content.replace(/\n/g, ""))));

    if (path.endsWith(".md")) {
      document.getElementById("fileContent").innerHTML = marked.parse(decoded);
      return;
    }

    if (/\.(js|json|html|css|yml|yaml|xml|ts)$/i.test(path)) {
      const safe = decoded.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
      document.getElementById("fileContent").innerHTML =
        `<pre><code class="language-${path.split('.').pop()}">${safe}</code></pre>`;
      hljs.highlightAll();
      return;
    }

    document.getElementById("fileContent").innerHTML = `<pre>${decoded}</pre>`;

  } catch (err) {
    showError(err.message);
  }
}

function showError(msg) {
  const content = document.getElementById("content");
  content.innerHTML = `<div class="error">${msg}</div>`;
}

/* API Tester */
async function sendApiRequest() {
  const url = document.getElementById("apiUrl").value.trim();
  const method = document.getElementById("apiMethod").value;
  const body = document.getElementById("apiBody").value.trim();
  const respEl = document.getElementById("apiResponse");

  if (!url) {
    respEl.textContent = "Fehler: URL darf nicht leer sein.";
    activateResponseTab();
    return;
  }

  try {
    const options = { method };

    if (["POST","PUT","PATCH","DELETE"].includes(method) && body !== "") {
      options.headers = { "Content-Type": "application/json" };
      options.body = body;
    }

    const res = await fetch(url, options);
    const text = await res.text();

    let formatted = text;
    try {
      const json = JSON.parse(text);
      formatted = JSON.stringify(json, null, 2);
      respEl.innerHTML = `<pre><code class="language-json">${formatted.replace(/[&<>]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]))}</code></pre>`;
      hljs.highlightAll();
    } catch {
      respEl.textContent = formatted;
    }

    activateResponseTab();
  } catch (err) {
    respEl.textContent = "Fehler: " + err.message;
    activateResponseTab();
  }
}

function clearApi() {
  document.getElementById("apiUrl").value = "";
  document.getElementById("apiBody").value = "";
  document.getElementById("apiResponse").textContent = "Noch keine Anfrage gesendet.";
  document.getElementById("apiMethod").value = "GET";
}

function activateResponseTab() {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
  document.querySelector('.tab[data-tab="responseTab"]').classList.add('active');
  document.getElementById('responseTab').classList.add('active');
}

loadPath();
</script>

</body>
</html>
