<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PZQQET | SOUVERÄNITÄTS-VIEWER 1.0</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --rfof-gold: #D4AF37;
            --rfof-green: #00FF42;
            --master-aura: 0 0 20px rgba(212, 175, 55, 0.3);
        }

        body, html {
            margin: 0; padding: 0;
            background: #000;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            overflow-x: hidden;
            scroll-behavior: smooth;
        }

        /* 00 FIXIERTER HEADER */
        header {
            position: fixed; top: 0; width: 100%; height: 60px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; z-index: 1000; box-sizing: border-box;
        }

        .master-aura {
            border: 1px solid var(--rfof-gold);
            box-shadow: var(--master-aura);
            padding: 5px 15px; border-radius: 20px;
            font-size: 0.8rem; font-weight: bold; color: var(--rfof-gold);
        }

        /* PRAI-NEURONEN AVATAR */
        .prai-avatar {
            width: 35px; height: 35px;
            background: linear-gradient(45deg, #1a1a1a, #333);
            border-radius: 50%; border: 1px solid var(--glass-border);
            overflow: hidden;
        }

        /* 02 KACHEL NULL (FIXIERTER MONITOR) */
        #kachel-null {
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 280px; padding: 15px;
            background: var(--glass); backdrop-filter: blur(15px);
            border: 1px solid var(--rfof-green); border-radius: 15px;
            z-index: 999; text-align: center;
        }

        /* 11 SEKTOREN GRID */
        main { padding-top: 80px; padding-bottom: 120px; }
        
        .sector {
            padding: 20px; margin-bottom: 40px;
            border-bottom: 1px solid var(--glass-border);
        }

        /* 13 DUALE SEKTOREN GRID */
        .dual-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .kachel {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 12px; padding: 15px; cursor: pointer;
            transition: transform 0.2s;
        }

        .kachel:hover { transform: scale(1.02); background: rgba(255,255,255,0.05); }

        .three-layer { display: flex; flex-direction: column; gap: 10px; }
        .layer { font-size: 0.7rem; color: #888; border-bottom: 1px solid #222; padding-bottom: 5px; }
        .diagramm-ebene { height: 60px; background: rgba(0,255,66,0.05); border-radius: 4px; }

        /* rAPP STORE SEKTOR 11 */
        .rapp-store {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px;
        }
        .rapp-icon {
            aspect-ratio: 1; background: #111; border-radius: 18px;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; font-size: 0.6rem;
        }

        /* OVERLAY LAYER */
        #overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; justify-content: center; align-items: center; z-index: 2000;
        }
        .app-card {
            background: #1c1c1e; width: 90%; max-width: 400px; padding: 30px;
            border-radius: 30px; text-align: center;
        }
        .btn-install {
            background: #007aff; color: white; border: none;
            padding: 12px 40px; border-radius: 20px; font-weight: bold; margin-top: 20px;
        }

        @media (max-width: 768px) {
            .dual-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <header>
        <div style="font-weight: bold; letter-spacing: 2px;">PZQQET</div>
        <div id="master-profile" class="master-aura">@RFOF-NETWORK</div>
        <div class="prai-avatar" id="avatar-target"></div>
    </header>

    <div id="kachel-null">
        <div style="font-size: 0.6rem; color: var(--rfof-green);">EREIGNISHORIZONT PUNKT E (6.5)</div>
        <div id="live-takt" style="font-size: 1.5rem; font-weight: bold;">0.000</div>
        <div id="sync-status" style="font-size: 0.5rem; letter-spacing: 1px;">SYNCING REALITY 0...</div>
    </div>

    <main id="app-flow">
        <section class="sector">
            <h3>03 DUALE SEKTOREN</h3>
            <div class="dual-grid" id="dual-grid-target">
                </div>
        </section>

        <section class="sector" id="sector-06">
            <h3>06 RFOF-GOLDEN DEX</h3>
            <div class="diagramm-ebene" style="height: 200px; border: 1px solid var(--rfof-green);">
                <div style="padding: 10px; font-size: 0.7rem; color: var(--rfof-green);">LIVE CANDLESTICK VECTOR [SIMULATED]</div>
            </div>
        </section>

        <section class="sector">
            <h3>11 rAPP STORE</h3>
            <div class="rapp-store">
                <div class="rapp-icon" onclick="openApp('GPCB')">GPCB</div>
                <div class="rapp-icon" onclick="openApp('ECCU')">ECCU</div>
                <div class="rapp-icon" onclick="openApp('CHAIN')">CHAIN</div>
                <div class="rapp-icon" onclick="openApp('API')">API</div>
                <div class="rapp-icon" onclick="openApp('GT-DOKU')">GT</div>
                <div class="rapp-icon" onclick="openApp('GT-PUB')">PUB</div>
            </div>
        </section>
    </main>

    <div id="overlay" onclick="this.style.display='none'">
        <div class="app-card" onclick="event.stopPropagation()">
            <div id="app-title" style="font-size: 1.5rem; margin-bottom: 10px;">App Name</div>
            <p id="app-desc" style="color: #888; font-size: 0.9rem;">Mechatronische Repository App.</p>
            <button class="btn-install">INSTALL rAPP</button>
        </div>
    </div>

    <script>
        // 1. TAKT-SYNCHRONISATION AUS INDEX.HTML (KELLER)
        window.addEventListener('storage', (e) => {
            if (e.key === 'PZQQET_STREAM') {
                const data = JSON.parse(atob(e.newValue)); // Base64 Demaskierung
                document.getElementById('live-takt').innerText = data.takt.toFixed(3);
                if (data.takt >= 6.4 && data.takt <= 6.6) {
                    document.getElementById('kachel-null').style.borderColor = '#D4AF37';
                } else {
                    document.getElementById('kachel-null').style.borderColor = '#00FF42';
                }
            }
        });

        // 2. GENERIERUNG DER 13 SEKTOREN (FRAKTAL)
        const sektoren = ["GPCB", "Phoenix Coin", "G-Phoenix Token", "Phoenix LP", "ECCU", "Joule", "XP", "GOLD", "RFOF", "RFOF/GOLD LP", "BIP", "Registry", "BRIDGE"];
        const grid = document.getElementById('dual-grid-target');

        sektoren.forEach((name, i) => {
            const kachel = document.createElement('div');
            kachel.className = 'kachel';
            kachel.innerHTML = `
                <div class="three-layer">
                    <div class="layer">GENESIS: PZQQET/03/${i+1}</div>
                    <div style="font-weight: bold; font-size: 0.9rem;">${name}</div>
                    <div class="layer">SYNC: 100M %</div>
                    <div class="diagramm-ebene" onclick="window.location.hash='#sector-06'"></div>
                </div>
            `;
            kachel.onclick = () => console.log(`Tunneling to Root: /${name.toLowerCase()}/`);
            grid.appendChild(kachel);
        });

        // 3. rAPP STORE LOGIK
        function openApp(name) {
            const overlay = document.getElementById('overlay');
            const title = document.getElementById('app-title');
            const desc = document.getElementById('app-desc');
            
            overlay.style.display = 'flex';
            title.innerText = name;
            desc.innerText = `Souveräne rApp der ${name}-Infrastruktur. Ready for Multi-Plattform Install via X-Hub.`;
        }

        // 4. PRAI-NEURONEN AVATAR GENERIERUNG
        function generatePraiAvatar() {
            const target = document.getElementById('avatar-target');
            // Simuliert PRAI-Algorithmus: Generiert Canvas-Muster statt Upload
            target.style.background = `radial-gradient(circle, #D4AF37 0%, #111 70%)`;
        }

        generatePraiAvatar();
    </script>
</body>
</html>
