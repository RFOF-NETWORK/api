<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PZQQET Browser Interface | Edition 4.0</title>
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --glass: rgba(255, 255, 255, 0.7);
            --accent: #0071e3;
            --text: #1d1d1f;
            --border: rgba(0, 0, 0, 0.1);
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--apple-bg);
            color: var(--text);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        /* 1. DYNAMISCHE SUCHLEISTE (FIXPUNKT) */
        header {
            position: sticky;
            top: 0;
            backdrop-filter: blur(20px);
            background: var(--glass);
            padding: 20px;
            border-bottom: 1px solid var(--border);
            z-index: 100;
            display: flex;
            justify-content: center;
        }

        .search-bar {
            width: 80%;
            max-width: 800px;
            padding: 12px 25px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: white;
            font-size: 18px;
            outline: none;
            transition: box-shadow 0.3s;
        }

        .search-bar:focus {
            box-shadow: 0 0 0 4px rgba(0, 113, 227, 0.2);
        }

        main {
            flex: 1;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        /* 2. KACHEL NULL (ZENTRALES GEHIRN) */
        .tile-zero {
            width: 300px;
            height: 300px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            position: relative;
            animation: pulse 4s infinite ease-in-out;
        }

        .tile-zero h2 { margin: 0; font-size: 14px; text-transform: uppercase; color: var(--accent); }
        .takt-display { font-size: 48px; font-weight: 700; margin: 10px 0; }
        .sector-status { font-size: 12px; color: #86868b; }

        /* 3. MONSTER-SCALING-MODUL (A-ZZ) */
        .scaling-container {
            width: 100%;
            display: flex;
            overflow-x: auto;
            gap: 15px;
            padding: 20px;
            scrollbar-width: none;
        }

        .node-tile {
            min-width: 120px;
            height: 120px;
            background: white;
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            flex-shrink: 0;
            transition: transform 0.2s;
        }

        .node-tile:hover { transform: scale(1.05); }
        .node-label { font-weight: bold; font-size: 20px; }

        /* 4. NEWS-VEKTOR (GT-PUBLISHER FOOTER) */
        footer {
            background: var(--text);
            color: white;
            padding: 15px 40px;
            font-size: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .news-ticker {
            color: #86868b;
            font-style: italic;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); box-shadow: 0 20px 40px rgba(0,0,0,0.1); }
            50% { transform: scale(1.02); box-shadow: 0 25px 50px rgba(0,113,227,0.15); }
        }
    </style>
</head>
<body>

<header>
    <input type="text" class="search-bar" placeholder="Innovation eingeben (.gt) / Exekution steuern (.ton)...">
</header>

<main>
    <div class="tile-zero" id="kachel-null">
        <h2>Kachel Null</h2>
        <div class="takt-display" id="takt-val">0.0</div>
        <div class="sector-status" id="node-id">Initialisiere...</div>
    </div>

    <div class="scaling-container" id="scaling-row">
        </div>
</main>

<footer>
    <div id="notary-status">Notarisierung: BEREIT</div>
    <div class="news-ticker" id="news-feed">Warte auf Takt 10 für GT-Publisher News...</div>
</footer>

<script>
    // Mechatronische Visualisierungs-Logik
    const taktVal = document.getElementById('takt-val');
    const newsFeed = document.getElementById('news-feed');
    const scalingRow = document.getElementById('scaling-row');

    // 1. Takt-Simulation (gekoppelt an index.html Logik)
    let currentTakt = 0;
    setInterval(() => {
        currentTakt = (currentTakt + 0.1) % 10.1;
        taktVal.innerText = currentTakt.toFixed(1);
        
        if (currentTakt >= 6.4 && currentTakt <= 6.6) {
            taktVal.style.color = '#0071e3'; // Punkt E Visualisierung
        } else {
            taktVal.style.color = '#1d1d1f';
        }

        if (currentTakt >= 10) {
            newsFeed.innerText = "GT-NEWS: Block im Sektor RFOF erfolgreich notarisiert. (100M% Proof)";
        }
    }, 100);

    // 2. Monster-Scaling Generierung (A bis Z und AA...)
    const alphabet = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    for (let char of alphabet) {
        let tile = document.createElement('div');
        tile.className = 'node-tile';
        tile.innerHTML = `<span class="node-label">${char}</span><span style="font-size:10px">Sektor Node</span>`;
        scalingRow.appendChild(tile);
    }
</script>

</body>
</html>
