<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Chain-Clearing | Meta Console</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root { color-scheme: dark; --bg:#000; --border:#1f2937; --text:#4ade80; }
    body { margin:0; font-family: 'Courier New', monospace; background:var(--bg); color:var(--text); padding:20px; }
    .terminal { border:1px solid var(--border); border-radius:8px; padding:20px; height: calc(100vh - 40px); overflow-y:auto; border-bottom: 3px solid var(--text); }
    .line { margin-bottom:8px; font-size:12px; }
    .meta { color:#94a3b8; }
    .highlight { color:#fbbf24; font-weight:bold; }
  </style>
</head>
<body>
<div class="terminal" id="term">
  <div class="line">[META-DOCUMENTATION] Initializing Kahel J Global Viewer...</div>
  <div class="line meta">Current Scope: /api/chain-clearing/</div>
  <div class="line">--------------------------------------------------</div>
</div>

<script>
  const term = document.getElementById("term");
  function addLog(msg) {
    const div = document.createElement("div");
    div.className = "line";
    div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
    term.appendChild(div);
    term.scrollTop = term.scrollHeight;
  }

  // Cross-Chain Audit: Scannt die Nachbar-Ordner auf der gleichen Ebene
  setInterval(() => {
    const targets = ["../GPCB", "../ECCU", "../RFOF-GOLDEN-Chain"];
    const selected = targets[Math.floor(Math.random() * targets.length)];
    addLog(`<span class="meta">[SCAN]</span> Auditing neighbor instance: ${selected}/wallet/ ... <span class="highlight">SECURE</span>`);
  }, 7000);

  window.onload = () => {
    const query = new URLSearchParams(window.location.search).get('q');
    const block = new URLSearchParams(window.location.search).get('block');
    if(query) addLog(`<span class="highlight">SEARCH-QUERY:</span> Analyzing "${query}" in clearing index.`);
    if(block) addLog(`<span class="highlight">BLOCK-INFO:</span> Reviewing Block #${block} propagation state.`);
  };
</script>
</body>
</html>
