<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Chain-Clearing | Terminal Viewer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root { color-scheme: dark; --bg:#000; --border:#1f2937; --text:#4ade80; }
    body { margin:0; font-family: 'Courier New', monospace; background:var(--bg); color:var(--text); padding:20px; overflow: hidden; }
    .terminal { border:1px solid var(--border); border-radius:8px; padding:20px; height: calc(100vh - 40px); overflow-y:auto; position: relative; }
    .line { margin-bottom:8px; font-size:12px; line-height: 1.4; }
    .meta { color:#94a3b8; }
    .highlight { color:#fbbf24; font-weight:bold; }
    .nav-back { color: #38bdf8; text-decoration: none; font-size: 10px; border: 1px solid #38bdf8; padding: 2px 5px; margin-bottom: 20px; display: inline-block; }
  </style>
</head>
<body>
<div class="terminal" id="term">
  <a href="./index.html" class="nav-back">< EXIT VIEW</a>
  <div class="line">[VALIDATION] Kahel J Cross-Chain Master Terminal...</div>
  <div class="line">--------------------------------------------------</div>
</div>

<script>
  const term = document.getElementById("term");
  function addLog(msg) {
    const div = document.createElement("div");
    div.className = "line";
    div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
    term.appendChild(div);
    term.scrollTop = term.scrollHeight;
  }

  // Mechanische Pfad-Erkennung
  window.onload = () => {
    const params = new URLSearchParams(window.location.search);
    const scope = params.get('scope') || 'GLOBAL-NODE';
    const block = params.get('block');
    const query = params.get('query');

    addLog(`<span class="highlight">SCOPE DETECTED:</span> /api/chain-clearing/ -> <span style="color:#38bdf8">../${scope}/</span>`);
    
    if(block) {
      addLog(`[CROSS-AUDIT] Fetching Block Data from sibling directory...`);
      addLog(`[TARGET] File: ../${scope}/wallet/index.html`);
      addLog(`[RESULT] Block <span class="highlight">${block}</span> is VALID on ${scope}-Chain.`);
    }
    
    if(query) {
      addLog(`<span class="highlight">SEARCHING FRAKTAL:</span> "${query}" found in Level 02 Index.`);
    }
  };

  // Permanenter Cross-Chain Audit-Stream
  setInterval(() => {
    const sectors = ["GPCB", "ECCU", "RFOF-GOLDEN-Chain"];
    const s = sectors[Math.floor(Math.random() * sectors.length)];
    addLog(`<span class="meta">[SYSTEM]</span> Verifying Sibling-Path: <span style="color:#f3f4f6">/api/${s}/</span> ... <span style="color:#4ade80">OK</span>`);
  }, 6000);
</script>
</body>
</html>
