<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PZQQET | GUCI-Instrument (Box J)</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --accent: #32d74b; 
            --terminal-bg: #0a0a0a;
            --text: #f5f5f7;
            --bg: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            height: 100vh; 
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 1. FRAKTALES DROPDOWN / HEADER */
        header {
            padding: 10px 20px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .dropdown-menu { display: flex; gap: 10px; }
        
        .nav-btn {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            color: var(--text);
            padding: 8px 15px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: 0.2s;
        }

        .nav-btn:hover { background: var(--accent); color: #000; }

        /* 2. GUCI CONTEXT INDICATOR */
        .guci-monitor {
            background: rgba(50, 215, 75, 0.1);
            border: 1px solid var(--accent);
            padding: 2px 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 11px;
        }

        /* MAIN LAYOUT */
        main {
            display: grid;
            grid-template-columns: 1fr 320px;
            grid-template-rows: 1fr 200px;
            gap: 15px;
            padding: 15px;
            flex-grow: 1;
        }

        .panel {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 18px;
            backdrop-filter: blur(15px);
            padding: 20px;
            position: relative;
        }

        /* BOSS-EBENE / EXPLORER */
        #block-explorer {
            overflow-y: auto;
            font-family: monospace;
            font-size: 12px;
        }

        .utx-block {
            background: rgba(255,255,255,0.02);
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 8px;
            border-left: 2px solid var(--accent);
        }

        /* 4. MASTER-SWITCH */
        #master-control {
            position: absolute;
            top: 20px; right: 20px;
            display: none; /* Nur für @RFOF-NETWORK */
        }

        /* ENERGETISCHE SYNTHESE UI */
        .synthese-stat {
            margin-bottom: 20px;
        }
        .parity-value { font-size: 28px; font-weight: 700; color: #fff; }

        /* TERMINAL (BOX I) */
        #terminal {
            grid-column: 1 / -1;
            background: var(--terminal-bg);
            border: 1px solid #1a1a1a;
            border-radius: 12px;
            padding: 15px;
            font-family: 'Courier New', monospace;
            color: var(--accent);
            font-size: 12px;
            overflow-y: auto;
        }

        /* RFOF-GOLDEN DEX VISUAL */
        .dex-visual {
            height: 100px;
            display: flex;
            align-items: flex-end;
            gap: 2px;
            margin-top: 10px;
        }
        .candle { flex: 1; background: var(--accent); opacity: 0.6; }

        .btn-rapp {
            width: 100%;
            padding: 12px;
            background: #fff;
            color: #000;
            border-radius: 10px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            margin-top: auto;
        }
    </style>
</head>
<body>

<header>
    <div class="dropdown-menu">
        <button class="nav-btn" onclick="showInfo('Wallet: 45% SAFE / 42% OWNER')">WALLET</button>
        <button class="nav-btn" onclick="showInfo('X-Hub: Fusion Active')">PROFILE</button>
        <button class="nav-btn" onclick="location.href='/settings/'">SETTINGS</button>
    </div>
    <div class="guci-monitor" id="guci-path">PATH: /chain-clearing/browser.html</div>
    <div id="master-status" style="font-size: 11px; color: var(--accent);">ROLE: ADMIN</div>
</header>

<main>
    <section class="panel">
        <h3>UTX-BASE64 CHAIN-EXPLORER (BOX J)</h3>
        <div id="block-explorer">
            </div>
        <div id="master-control">
            <button class="nav-btn" style="border-color: red;">MASTER-SWITCH</button>
        </div>
    </section>

    <aside class="panel" style="display: flex; flex-direction: column;">
        <div class="synthese-stat">
            <label style="font-size: 11px; opacity: 0.5;">42E0-GESETZ PARITY</label>
            <div class="parity-value">€ 2.50</div>
            <div style="font-size: 12px; opacity: 0.8;">= 1 ECCU (2 TB Joule)</div>
        </div>

        <div class="synthese-stat">
            <label style="font-size: 11px; opacity: 0.5;">RFOF-GOLDEN DEX</label>
            <div class="dex-visual" id="dex-candles"></div>
        </div>

        <button class="btn-rapp">INSTALL rAPP MANIFEST</button>
    </aside>

    <section id="terminal">
        <div style="opacity: 0.5;">[PZQQET_BOOT_SEQUENCE_COMPLETE]</div>
        <div>> INITIALIZING GUCI CONTEXT ANALYSIS...</div>
    </section>
</main>

<script>
    const terminal = document.getElementById('terminal');
    const explorer = document.getElementById('block-explorer');
    const dex = document.getElementById('dex-candles');

    // 1. GUCI-Intelligenz Simulation
    const path = window.location.pathname;
    document.getElementById('guci-path').innerText = `GUCI_CONTEXT: ${path.toUpperCase()} [JOUL_SYNC_ACTIVE]`;

    // 2. Terminal Clearing Logs
    const logs = [
        "Clearing Joule Block #42E0...",
        "UTX-Base64: Masking applied (Role: AAA)",
        "Fee-Distribution: 45% SAFE Locked",
        "rApp-Bridge: Injektion lückenlos",
        "ECCU Parity-Anchor: Stable at 2.50€",
        "Realität 0: Sync 100.000.000%"
    ];

    function addLog() {
        const line = document.createElement('div');
        line.innerText = `> ${new Date().toLocaleTimeString()} : ${logs[Math.floor(Math.random()*logs.length)]}`;
        terminal.appendChild(line);
        terminal.scrollTop = terminal.scrollHeight;
    }

    // 3. Block-Explorer (UTX-Base64)
    function addBlock() {
        const block = document.createElement('div');
        block.className = 'utx-block';
        const hash = btoa(Math.random().toString()).substring(0, 32);
        block.innerHTML = `<strong>BLOCK_${Date.now()}</strong><br><span style="color:#888;">HASH: ${hash}</span><br>ENERGY: 2 TB JOULE`;
        explorer.prepend(block);
        if(explorer.children.length > 5) explorer.lastChild.remove();
    }

    // 4. DEX Visual Simulation
    function updateDex() {
        const candle = document.createElement('div');
        candle.className = 'candle';
        candle.style.height = Math.random() * 80 + 10 + "px";
        dex.appendChild(candle);
        if(dex.children.length > 30) dex.firstChild.remove();
    }

    // 5. Rollen-Hierarchie Simulation
    if(window.location.hash === "#rfof-network") {
        document.getElementById('master-control').style.display = 'block';
        document.getElementById('master-status').innerText = "ROLE: MASTER (@RFOF-NETWORK)";
    }

    // Intervalle
    setInterval(addLog, 2000);
    setInterval(addBlock, 4000);
    setInterval(updateDex, 1000);

    function showInfo(msg) {
        const line = document.createElement('div');
        line.style.color = '#fff';
        line.innerText = `[INFO] ${msg}`;
        terminal.appendChild(line);
    }
</script>

</body>
</html>
