<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PZQQET COCKPIT - BROWSER</title>
    <style>
        :root {
            --apple-bg: #f5f5f7;
            --apple-glass: rgba(255, 255, 255, 0.8);
            --pzqqet-gold: #d4af37;
            --pzqqet-blue: #0071e3;
            --transition-speed: 0.6s cubic-bezier(0.25, 0.1, 0.25, 1);
        }

        body {
            margin: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: var(--apple-bg);
            color: #1d1d1f;
            overflow-x: hidden;
        }

        /* 1. DYNAMISCHE FRONTEND-PHYSIK */
        .search-bar-fixed {
            position: fixed;
            top: 0; width: 100%;
            height: 60px;
            background: var(--apple-glass);
            backdrop-filter: blur(20px);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-bottom: 0.5px solid rgba(0,0,0,0.1);
        }

        /* 2. KACHEL NULL (0) - DAS KERN-GEHIRN */
        .tile-zero-container {
            margin-top: 100px;
            display: flex;
            justify-content: center;
            transition: var(--transition-speed);
        }

        .tile-zero {
            width: 300px;
            height: 300px;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.05);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .takt-display {
            font-size: 3rem;
            font-weight: 700;
            color: var(--pzqqet-blue);
        }

        /* 3. DYNAMISCHER ZWISCHENBEREICH (INTERFACE-SEKTOR) */
        .interface-sector {
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(7, 1fr); /* Das feste 7-Kachel-Skript */
            gap: 20px;
            opacity: 0;
            transform: translateY(20px);
        }

        .sector-active {
            opacity: 1;
            transform: translateY(0);
        }

        /* 4. MONSTER-SCALING (A-ZZ) */
        .monster-row {
            display: flex;
            padding: 10px 40px;
            border-bottom: 0.5px solid rgba(0,0,0,0.05);
            font-size: 0.8rem;
            color: #86868b;
        }

        /* 5. GT-PUBLISHER (NEWS-VEKTOR) */
        footer {
            position: fixed;
            bottom: 0; width: 100%;
            height: 40px;
            background: #000;
            color: white;
            display: flex;
            align-items: center;
            padding-left: 20px;
            font-size: 0.75rem;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header class="search-bar-fixed">
        <input type="text" placeholder="PZQQET SYSTEM-SEARCH..." id="main-search" 
               style="width: 60%; border: none; background: transparent; font-size: 1.1rem; outline: none;">
    </header>

    <main>
        <div class="tile-zero-container" id="zero-view">
            <div class="tile-zero">
                <div id="takt-count" class="takt-display">0.0</div>
                <div id="status-label" style="font-weight: 600; text-transform: uppercase; font-size: 0.7rem;">Realität 0</div>
                <canvas id="point-e-visualizer" style="position: absolute; bottom: 0;"></canvas>
            </div>
        </div>

        <section class="interface-sector" id="dynamic-grid"></section>

        <section id="monster-scaling-area"></section>
    </main>

    <footer>
        <span id="gt-ticker">GT-PUBLISHER: SYSTEM READY | WAITING FOR TAKT 10...</span>
    </footer>

    <script>
        // BINÄRE KOPPLUNG: Empfang der Daten von index.html
        const syncChannel = new BroadcastChannel('pzqqet_sync');
        
        syncChannel.onmessage = (event) => {
            const { takt, sector, manager, status } = event.data;
            
            // 1. Takt-Anzeige updaten
            document.getElementById('takt-count').innerText = takt.toFixed(1);
            
            // 2. Kachel-Null Animation bei Punkt E (6.5)
            if (takt >= 6.5) {
                document.querySelector('.tile-zero').style.boxShadow = "0 0 30px #d4af37";
            }

            // 3. Status-Update (A/AA/AAA)
            document.getElementById('status-label').innerText = `STATUS: ${status}`;

            // 4. GT-Publisher News fixieren bei Takt 10
            if (takt === 10) {
                document.getElementById('gt-ticker').innerText = 
                    `GT-PUBLISHER: BLOCK ${sector} NOTARISIERT DURCH MANAGER ${manager} | REALITÄT 0 FIXIERT.`;
            }
        };

        // UI-Interaktion: Expansion bei Suche
        document.getElementById('main-search').addEventListener('focus', () => {
            document.getElementById('dynamic-grid').classList.add('sector-active');
            document.getElementById('zero-view').style.transform = "scale(0.8)";
        });
    </script>
</body>
</html>
