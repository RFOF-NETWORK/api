<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>PZQQET EXPLORER | Clearing-Monitor Realität 0</title>
    <style>
        :root {
            --bg-dark: #050505;
            --glass: rgba(20, 20, 20, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --glow-a: 0 0 10px #00ff88;   /* User */
            --glow-aa: 0 0 15px #00bcff;  /* Admin/Dev */
            --glow-aaa: 0 0 25px #ff00ff; /* Master */
            --prai-neon: #00f3ff;
        }

        body {
            margin: 0;
            background: var(--bg-dark);
            color: #fff;
            font-family: "SF Pro Display", -apple-system, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* SIDEBAR: ALPHA-NODES FLOW */
        aside {
            width: 300px;
            background: rgba(0,0,0,0.4);
            border-right: 1px solid var(--border);
            backdrop-filter: blur(30px);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .node-flow {
            display: flex;
            flex-direction: column;
            gap: 15px;
            position: relative;
        }

        .alpha-node {
            padding: 15px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 12px;
            font-size: 0.8rem;
            position: relative;
            transition: 0.3s;
        }

        .alpha-node.active { border-color: var(--prai-neon); box-shadow: var(--glow-aa); }

        /* MAIN CONTENT: CLUSTER MATRIX */
        main {
            flex: 1;
            padding: 30px;
            overflow-y: auto;
            background: radial-gradient(circle at top right, rgba(0, 243, 255, 0.05), transparent);
        }

        .cluster-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }

        .cluster-card {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 15px;
            padding: 20px;
            backdrop-filter: blur(10px);
            position: relative;
        }

        .identity-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        /* STATUS GLOWS */
        .status-a { background: #00ff88; box-shadow: var(--glow-a); }
        .status-aa { background: #00bcff; box-shadow: var(--glow-aa); }
        .status-aaa { background: #ff00ff; box-shadow: var(--glow-aaa); }

        /* MONITORING BARS */
        .monitor-bar {
            height: 4px;
            background: rgba(255,255,255,0.05);
            margin-top: 10px;
            border-radius: 2px;
            overflow: hidden;
        }

        .fill { height: 100%; transition: width 1s ease-in-out; }

        /* RESET PULSE OVERLAY */
        #reset-overlay {
            position: fixed;
            inset: 0;
            background: white;
            opacity: 0;
            pointer-events: none;
            z-index: 9999;
        }

        .master-override-panel {
            margin-top: auto;
            padding: 15px;
            border: 1px dashed #ff00ff;
            border-radius: 10px;
            display: none; /* Nur für AAA sichtbar */
        }
    </style>
</head>
<body>

<div id="reset-overlay"></div>

<aside>
    <h2 style="font-size: 1rem; color: var(--prai-neon);">ALPHA-NODES (A-Z)</h2>
    <div class="node-flow">
        <div class="alpha-node" id="node-ag">A-G: EINGANG/AUTH <br><small>auth.js active</small></div>
        <div class="alpha-node" id="node-hn">H-N: JOULE-QUANT <br><small>quantizer.py scaling</small></div>
        <div class="alpha-node" id="node-ou">O-U: CLEARING-MAP <br><small>map_core.cpp active</small></div>
        <div class="alpha-node" id="node-vz">V-Z: ZERO-POINT <br><small>reset_pulse.sh ready</small></div>
    </div>
    
    <div class="master-override-panel" id="master-panel">
        <small style="color:#ff00ff">AXIOM_OVERRIDE.BIN</small><br>
        <button onclick="triggerReset()" style="background:none; border:1px solid #ff00ff; color:#fff; cursor:pointer; margin-top:5px; width:100%">RESET PULSE</button>
    </div>
</aside>

<main>
    <div style="display:flex; justify-content:space-between; margin-bottom:30px;">
        <h1 style="font-size: 1.5rem; margin:0;">SYSTEM-EXPLORER <span style="font-weight:100; opacity:0.5;">/ MASTER_VIEWER</span></h1>
        <div id="sync-bridge-heartbeat" style="font-size:0.7rem; color:var(--prai-neon)">SYNC_BRIDGE: ACTIVE</div>
    </div>

    <div class="cluster-grid" id="cluster-container">
        </div>
</main>

<script>
    const clusters = [
        { id: 'GPCB', name: 'G-Phoenix Bank', status: 'aaa', extra: 'Liquidity: Stable' },
        { id: 'ECCU', name: 'Central Value', status: 'aa', extra: 'Parity: 2.50€' },
        { id: 'RFOF', name: 'Gold-Chain', status: 'aaa', extra: 'Audit: ISO-42E0' },
        { id: 'APP-API', name: 'Digital Staff', status: 'aa', extra: 'Takt: Sync' },
        { id: 'STORY', name: 'Publisher-Kern', status: 'a', extra: 'Archive: 100%' },
        { id: 'ALPHA', name: 'Alpha-Nodes', status: 'aaa', extra: 'Nodes: A-Z' },
        { id: 'API', name: 'Open Vektor', status: 'a', extra: 'Trigger: 0.2%' },
        { id: 'X-HUB', name: 'Code-Injector', status: 'aaa', extra: 'Updates: Live' },
        { id: 'CROSS', name: 'Validation', status: 'aa', extra: 'Point-E: 6.5' },
        { id: 'USER', name: 'Individual', status: 'a', extra: 'ID: Satoramy' },
        { id: 'ADMIN', name: 'Control', status: 'aa', extra: 'Fees: 45/42/10/3' },
        { id: 'DEV', name: 'Dev-Cluster', status: 'aa', extra: 'Axiom-Check' },
        { id: 'MASTER', name: 'Owner-Cluster', status: 'aaa', extra: '@RFOF-NETWORK' },
        { id: 'ENT', name: 'Enterprise', status: 'aa', extra: 'Settlement' },
        { id: 'PART', name: 'Partner', status: 'a', extra: 'Synergy: On' }
    ];

    const container = document.getElementById('cluster-container');

    clusters.forEach(c => {
        const card = document.createElement('div');
        card.className = 'cluster-card';
        card.innerHTML = `
            <div class="identity-badge status-${c.status}"></div>
            <div style="font-size:0.6rem; opacity:0.5; margin-bottom:5px;">/${c.id}/MANAGER/</div>
            <div style="font-size:1.1rem; font-weight:bold;">${c.name}</div>
            <div style="font-size:0.7rem; margin-top:10px; color:var(--prai-neon)">${c.extra}</div>
            <div class="monitor-bar"><div class="fill" style="width:${Math.random()*100}%; background:var(--prai-neon)"></div></div>
        `;
        container.appendChild(card);
    });

    // MASTER AAA CHECK
    const isMaster = true; // In Produktion via identity.gt validiert
    if(isMaster) document.getElementById('master-panel').style.display = 'block';

    // RESET PULSE (ALPHA-NODES/reset_pulse.sh)
    function triggerReset() {
        const overlay = document.getElementById('reset-overlay');
        overlay.style.transition = 'none';
        overlay.style.opacity = '1';
        setTimeout(() => {
            overlay.style.transition = 'opacity 2s ease-out';
            overlay.style.opacity = '0';
        }, 50);
        console.log("SYSTEM RESET PULSE EXECUTED.");
    }

    // SYNC-BRIDGE HEARTBEAT
    setInterval(() => {
        const bridge = document.getElementById('sync-bridge-heartbeat');
        bridge.style.opacity = bridge.style.opacity === '0.3' ? '1' : '0.3';
    }, 1000);

    // PERFORMANCE BOOST LOGIC
    console.log("Performance Boost active: Pixel-to-Joule optimization 1:1");

</script>
</body>
</html>
