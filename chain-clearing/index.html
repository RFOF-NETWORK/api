<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Chain-Clearing | Kachel J Explorer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root { color-scheme: dark; --bg:#050505; --bg-alt:#0a0a0a; --border:#1f2937; --text:#f3f4f6; --j-color:#4ade80; --gold:#fbbf24; --eccu:#22c55e; --rfof:#38bdf8; }
    body { margin:0; font-family: 'Inter', sans-serif; background:var(--bg); color:var(--text); overflow: hidden; }
    header { padding:15px 20px; border-bottom:1px solid var(--border); background:#000; display:flex; justify-content:space-between; align-items:center; border-top: 3px solid var(--j-color); position: sticky; top: 0; z-index: 1000; }
    main { padding:20px; max-width: 1200px; margin: 0 auto; height: calc(100vh - 120px); overflow-y: auto; }
    
    .search-bar { width:100%; background:var(--bg-alt); border:1px solid var(--border); border-radius:12px; padding:15px; display:flex; gap:10px; margin-bottom:25px; position: sticky; top: 0; z-index: 999; }
    .search-bar input { flex-grow:1; background:transparent; border:none; outline:none; color:var(--text); font-family:monospace; }
    
    .clearing-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px; }
    .sector-node { background:var(--bg-alt); border:1px solid var(--border); border-radius:12px; padding:20px; position:relative; overflow:hidden; display: flex; flex-direction: column; }
    .sector-node::before { content:''; position:absolute; top:0; left:0; width:100%; height:2px; opacity:0.5; }
    
    .node-gpcb::before { background:var(--gold); }
    .node-eccu::before { background:var(--eccu); }
    .node-rfof::before { background:var(--rfof); }
    
    .node-header { display:flex; justify-content:space-between; margin-bottom:15px; font-size:12px; font-weight:bold; cursor: pointer; }
    
    .data-stream { 
      font-family:monospace; 
      font-size:11px; 
      color:#9ca3af; 
      height:150px; 
      overflow-y: scroll; 
      scrollbar-width: thin; 
      display: flex;
      flex-direction: column;
    }
    
    .data-entry { 
      cursor: pointer; 
      display: block; 
      padding: 8px; 
      border-bottom: 1px solid rgba(31, 41, 55, 0.5); 
      transition: background 0.2s;
    }
    .data-entry:hover { background: rgba(74, 222, 128, 0.1); color: var(--j-color); }

    .bip-footer { position:fixed; bottom:0; left:0; right:0; background:#000; padding:10px 20px; border-top:1px solid var(--border); font-size:10px; color:var(--j-color); font-family:monospace; display:flex; justify-content:space-between; z-index: 1000; }
  </style>
</head>
<body>
<header>
  <div style="font-weight:bold; letter-spacing:1px;" onclick="window.location.reload()">KAHEL J | UNIVERSAL MASTER EXPLORER</div>
  <div style="font-size:11px; font-family:monospace;">LEVEL: <span style="color:var(--j-color);">01 (PRESENT)</span></div>
</header>

<main>
  <div class="search-bar">
    <span style="color:var(--j-color);">🔍</span>
    <input type="text" placeholder="Geben Sie GUCI oder Hash für Level 02/03 Analyse ein..." id="search-input">
  </div>

  <div class="clearing-grid">
    <div class="sector-node node-gpcb">
      <div class="node-header" onclick="window.location.href='../GPCB/browser.html'"><span style="color:var(--gold);">API: GPCB</span> <span>VIEW SIBLING</span></div>
      <div class="data-stream" id="stream-gpcb">
        <span class="data-entry" onclick="window.location.href='./browser.html?level=02&node=GPCB'">> [L02] Root Archive Access</span>
      </div>
    </div>

    <div class="sector-node node-eccu">
      <div class="node-header" onclick="window.location.href='../ECCU/browser.html'"><span style="color:var(--eccu);">API: ECCU</span> <span>VIEW SIBLING</span></div>
      <div class="data-stream" id="stream-eccu">
        <span class="data-entry" onclick="window.location.href='./browser.html?level=02&node=ECCU'">> [L02] Energy-Stability Check</span>
      </div>
    </div>

    <div class="sector-node node-rfof">
      <div class="node-header" onclick="window.location.href='../RFOF-GOLDEN-Chain/browser.html'"><span style="color:var(--rfof);">API: RFOF</span> <span>VIEW SIBLING</span></div>
      <div class="data-stream" id="stream-rfof">
        <span class="data-entry" onclick="window.location.href='./browser.html?level=02&node=RFOF'">> [L02] PZQQET Pulse Audit</span>
      </div>
    </div>
  </div>
</main>

<div class="bip-footer">
  <div>KAHEL-J || CROSS-CHAIN INTERFACE || LEVEL 01 ACTIVE</div>
  <div id="clock">00:00:00</div>
</div>

<script>
  function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }
  setInterval(updateClock, 1000);
  
  const sectors = [
    { id: 'stream-gpcb', name: 'GPCB', path: '../GPCB' },
    { id: 'stream-eccu', name: 'ECCU', path: '../ECCU' },
    { id: 'stream-rfof', name: 'RFOF', path: '../RFOF-GOLDEN-Chain' }
  ];

  setInterval(() => {
    const s = sectors[Math.floor(Math.random()*sectors.length)];
    const el = document.getElementById(s.id);
    const hash = "0x" + Math.random().toString(16).substring(2,10).toUpperCase();
    
    const entry = document.createElement('span');
    entry.className = 'data-entry';
    // Hier wird die "Drauftippbarkeit" für Level 03 (Detail-Rendering) erzeugt
    entry.onclick = () => { window.location.href = `./browser.html?level=03&node=${s.name}&block=${hash}`; };
    entry.innerHTML = `> Block ${hash} [L03 Rendering]`;
    
    el.insertBefore(entry, el.firstChild);
    if(el.children.length > 100) el.lastChild.remove();
  }, 2500);

  document.getElementById('search-input').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') window.location.href = `./browser.html?level=02&query=${this.value}`;
  });
</script>
</body>
</html>
