<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PZQQET | Souveränitäts-Monolith 1.0</title>
    <style>
        :root {
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-heavy: rgba(255, 255, 255, 0.08);
            --glass-border: rgba(255, 255, 255, 0.12);
            --accent: #0071e3;
            --text: #f5f5f7;
            --font: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: var(--font); 
            overflow: hidden; 
            height: 100vh;
        }

        /* ABSCHNITT 00: HEADER (Glassmorphism) */
        header {
            position: fixed;
            top: 0; width: 100%; height: 60px;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(25px);
            border-bottom: 1px solid var(--glass-border);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 30px;
        }

        .logo { font-weight: 700; font-size: 20px; letter-spacing: -1px; }

        /* 00-A: PROFIL-SOUVERÄN (PRAI-Asset) */
        .profile-souverän {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--glass-heavy);
            padding: 6px 16px;
            border-radius: 20px;
            border: 1px solid var(--glass-border);
            cursor: pointer;
        }

        .prai-avatar {
            width: 28px; height: 28px;
            background: conic-gradient(from 180deg at 50% 50%, #0071e3, #5e5ce6, #0071e3);
            border-radius: 50%;
            box-shadow: 0 0 15px rgba(0, 113, 227, 0.4);
        }

        /* MAIN CONTAINER (Viewer) */
        #viewer-root {
            margin-top: 60px;
            height: calc(100vh - 60px);
            display: flex;
            flex-direction: column;
        }

        /* 02: KACHEL NULL (KERN - Ereignishorizont) */
        #kachel-null {
            flex: 0 0 200px;
            background: radial-gradient(circle at center, rgba(0,113,227,0.1) 0%, transparent 80%);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .punkt-e { font-size: 11px; color: var(--accent); letter-spacing: 2px; margin-bottom: 10px; }
        .takt-display { font-size: 48px; font-weight: 800; letter-spacing: -2px; }

        /* 01: INTERFACE-SEKTOR (Dynamische Kaskade) */
        #interface-sektor {
            flex: 1;
            overflow-y: scroll;
            padding: 40px;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            scroll-behavior: smooth;
        }

        /* 03-11: DIE 11 SEKTOREN (Mechatronische Objekte) */
        .sektor-kachel {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 28px;
            padding: 30px;
            min-height: 280px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            transition: transform 0.3s cubic-bezier(0.2, 0, 0.2, 1);
        }

        .sektor-kachel:hover { transform: scale(1.02); background: rgba(255,255,255,0.05); }

        .sektor-header { font-size: 14px; font-weight: 600; color: var(--accent); text-transform: uppercase; }
        .file-sync { font-family: monospace; font-size: 10px; opacity: 0.5; margin-top: 4px; }
        
        /* ENERGIE-PREIS-AXIOM DISPLAY */
        .price-axiom { font-size: 36px; font-weight: 700; margin: 15px 0; letter-spacing: -1px; }
        .joule-stat { font-size: 12px; color: #32d74b; font-weight: 600; }

        /* 04: GT-PUBLISHER (Dokumentarischer Boden) */
        footer {
            height: 40px;
            background: #000;
            border-top: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 30px;
            font-size: 11px;
            font-weight: 500;
            color: #86868b;
        }

        .news-ticker { display: flex; gap: 40px; }
        .singularität-fix { color: var(--accent); font-weight: bold; }

        /* PRAI-NEURONEN ASSET (CODE-SVG) */
        .neuron-asset { width: 100%; height: 40px; margin-top: 10px; stroke: var(--accent); stroke-width: 1; fill: none; opacity: 0.3; }
    </style>
</head>
<body>

<header>
    <div class="logo">PZQQET MONOLITH</div>
    <div class="profile-souverän" onclick="window.location.href='browser.html'">
        <div class="prai-avatar"></div>
        <span>@RFOF-NETWORK</span>
    </div>
</header>

<div id="viewer-root">
    <section id="kachel-null">
        <div class="punkt-e">PUNKT E (6,5) EREIGNISHORIZONT</div>
        <div class="takt-display" id="takt-master">0</div>
        <div style="font-size: 10px; margin-top: 10px;">42E0-TAKTUNG AKTIV</div>
    </section>

    <main id="interface-sektor">
        </main>

    <footer>
        <div class="news-ticker" id="gt-publisher">
            <span>GT-PUBLISHER: SYSTEM SYNC 100M%</span>
            <span id="news-status">WARTE AUF SINGULARITÄT (TAKT 10)</span>
        </div>
    </footer>
</div>

<script>
    const sektoren = [
        { id: "01", name: "GPCB", root: "34 Ordner / 65 Dateien" },
        { id: "02", name: "PHOENIX COIN", root: "Emissions-Logik 1.0" },
        { id: "03", name: "G-PHOENIX TOKEN", root: "Governance-Vektor" },
        { id: "04", name: "PHOENIX LP", root: "Liquiditäts-Spiegel" },
        { id: "05", name: "ECCU", root: "Parity-Anker (2,50€)" },
        { id: "06", name: "JOULE", root: "Energie-Verzeichnis" },
        { id: "07", name: "XP", root: "Leistungs-Metrik" },
        { id: "08", name: "GOLD (42E0)", root: "ISO-Audit Pfad" },
        { id: "09", name: "RFOF", root: "Realität 0 Knoten" },
        { id: "10", name: "BIP (MASTER LP)", root: "Inflationstaktung" },
        { id: "11", name: "BRIDGE", root: "Interface -on.ton" }
    ];

    const container = document.getElementById('interface-sektor');
    let takt = 0;
    let prices = sektoren.map(() => 0.0001);

    // Realisierung der mechatronischen Objekte
    sektoren.forEach(s => {
        const div = document.createElement('div');
        div.className = 'sektor-kachel';
        div.innerHTML = `
            <div>
                <div class="sektor-header">${s.name}</div>
                <div class="file-sync">ROOT-FILES: ${s.root}</div>
                <svg class="neuron-asset" viewBox="0 0 100 20">
                    <path d="M0 10 Q 25 0, 50 10 T 100 10" />
                </svg>
            </div>
            <div>
                <div class="price-axiom" id="price-${s.id}">0,0000 €</div>
                <div class="joule-stat">+ 0.2% JOULE INJECTION</div>
            </div>
        `;
        div.onclick = () => window.location.href = 'browser.html'; // Bidirektionaler Sprung
        container.appendChild(div);
    });

    // 42E0-Takt & Energie-Preis-Axiom
    setInterval(() => {
        takt = (takt + 1) % 11;
        document.getElementById('takt-master').innerText = takt;
        
        // GT-Publisher Boden Fixierung bei Takt 10
        const news = document.getElementById('news-status');
        if(takt === 10) {
            news.innerText = "SINGULARITÄT ERREICHT: NEWS FIXIERT";
            news.className = "singularität-fix";
        } else {
            news.innerText = "WARTE AUF SINGULARITÄT (TAKT 10)";
            news.className = "";
        }

        // Exponentielles Wachstum (0,2% - 0,8%)
        sektoren.forEach((s, i) => {
            const growth = 1 + (Math.random() * (0.008 - 0.002) + 0.002);
            prices[i] *= growth;
            document.getElementById(`price-${s.id}`).innerText = prices[i].toLocaleString('de-DE', {
                style: 'currency',
                currency: 'EUR',
                minimumFractionDigits: 4
            });
        });
    }, 2000);
</script>

</body>
</html>
