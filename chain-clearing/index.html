<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=1280, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PZQQET | CHAIN-CLEARING MONOLITH</title>
    <style>
        :root {
            --bg: #000000;
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --prai-cyan: #00f3ff;
            --aaa-magenta: #ff00ff;
            --aa-blue: #00bcff;
            --a-green: #00ff88;
            --blur: blur(40px);
            --sat: saturate(160%);
            --font: -apple-system, "SF Pro Display", sans-serif;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; cursor: crosshair; }
        body { 
            background: var(--bg); 
            color: #fff; 
            font-family: var(--font); 
            width: 1280px; 
            height: 100vh; 
            overflow: hidden; 
            position: relative;
        }

        /* 0. LOGIN-SYSTEM CSS */
        #login-screen {
            position: fixed; 
            inset: 0; 
            background: #000; 
            z-index: 10000; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center;
            backdrop-filter: var(--blur);
        }
        .login-box {
            background: var(--glass);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid var(--glass-border);
            text-align: center;
            width: 400px;
        }
        input {
            width: 100%; padding: 15px; margin: 10px 0;
            background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
            color: #fff; border-radius: 10px; outline: none;
        }
        button.prai-btn {
            background: var(--prai-cyan); color: #000; font-weight: bold;
            padding: 15px 30px; border: none; border-radius: 10px; width: 100%;
        }

        /* 1. HEADER (BOX B) */
        header {
            position: fixed; top: 0; width: 1280px; height: 80px;
            background: rgba(0,0,0,0.5); backdrop-filter: var(--blur) var(--sat);
            border-bottom: 1px solid var(--glass-border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; z-index: 5000;
        }
        .profile-trigger {
            display: flex; align-items: center; gap: 15px; position: relative;
        }
        .avatar { width: 45px; height: 45px; border-radius: 50%; background: linear-gradient(45deg, #333, #666); border: 2px solid var(--prai-cyan); }
        .dropdown {
            position: absolute; top: 60px; right: 0; width: 280px;
            background: rgba(10,10,10,0.95); backdrop-filter: var(--blur);
            border: 1px solid var(--glass-border); border-radius: 20px;
            display: none; flex-direction: column; padding: 15px;
        }
        .dropdown.active { display: flex; }
        .nav-btn { padding: 12px; border-radius: 10px; transition: 0.3s; margin-bottom: 5px; cursor: pointer; }
        .nav-btn:hover { background: var(--glass); }

        /* 2. KACHEL NULL (SEKTOR 02) */
        #kachel-null {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 500px; height: 500px; z-index: 100; pointer-events: none;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .takt-ring {
            position: absolute; width: 100%; height: 100%;
            border: 2px solid transparent; border-top: 2px solid var(--prai-cyan);
            border-radius: 50%; transition: transform 0.1s linear;
        }
        .takt-display { font-size: 120px; font-weight: 100; text-shadow: 0 0 40px var(--prai-cyan); }

        /* 3. GRID & SEKTOREN */
        #master-grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px; padding: 100px 40px; height: 100vh; overflow-y: auto;
            scrollbar-width: none;
        }
        .sektor-box {
            background: var(--glass); border: 1px solid var(--glass-border);
            border-radius: 25px; padding: 20px; position: relative;
            transition: transform 0.2s ease;
        }
        .dual-view { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .view-pane { background: rgba(0,0,0,0.4); border-radius: 15px; padding: 10px; font-size: 10px; height: 120px; overflow: hidden; }
        .diagram-layer { height: 60px; margin-top: 10px; display: flex; align-items: flex-end; gap: 2px; }
        .candle { width: 4px; background: var(--a-green); min-height: 2px; }

        /* 4. TERMINAL & OVERLAYS */
        #terminal {
            position: fixed; bottom: 0; width: 1280px; height: 180px;
            background: rgba(0,0,0,0.8); border-top: 1px solid var(--glass-border);
            font-family: "SF Mono", monospace; font-size: 11px; padding: 15px;
            overflow-y: auto; z-index: 4000;
        }
        #reset-pulse { position: fixed; inset: 0; background: #fff; opacity: 0; pointer-events: none; z-index: 9999; }
    </style>
</head>
<body id="monolith">

    <div id="login-screen">
        <div class="login-box">
            <h1 style="margin-bottom:20px; letter-spacing: 5px;">PZQQET</h1>
            <input type="text" id="username" placeholder="NUTZERNAME">
            <input type="password" id="password" placeholder="PASSWORT">
            <button class="prai-btn" onclick="APP.login()">INITIALIZE GUCI</button>
        </div>
    </div>

    <div id="main-ui" style="display:none;">
        <header>
            <div class="logo">PZQQET / CHAIN-CLEARING</div>
            <div class="profile-trigger" onclick="APP.toggleDropdown()">
                <div class="souveraen-meta" style="text-align:right">
                    <div id="display-name">MASTER</div>
                    <div id="master-id" style="font-size:8px; opacity:0.5;">ID: --</div>
                </div>
                <div class="avatar" id="display-avatar"></div>
                <div class="dropdown" id="user-dropdown">
                    <div class="nav-btn" onclick="APP.showView('wallet')">WALLET (BUSINESS)</div>
                    <div class="nav-btn" onclick="APP.showView('profile')">PROFILE (SOCIAL)</div>
                    <div class="nav-btn" onclick="APP.showView('settings')">SETTINGS (SYSTEM)</div>
                    <hr style="opacity:0.1; margin: 10px 0;">
                    <div class="nav-btn" onclick="APP.logout()">LOGOUT</div>
                </div>
            </div>
        </header>

        <section id="kachel-null">
            <div class="takt-ring" id="takt-ring"></div>
            <div class="event-point">E(6,5)</div>
            <div class="takt-display" id="takt-val">0</div>
        </section>

        <main id="master-grid">
            </main>

        <div id="terminal">
            <div id="log-output"></div>
        </div>
    </div>

    <div id="reset-pulse"></div>

    <script>
        /**
         * 🕋 PZQQET OPERATIVE ENGINE 1.0
         * MONOLITHISCHER KERN
         */
        const APP = {
            user: null,
            takt: 0,
            sectors: [
                "GPCB", "Phoenix Coin", "G-Phoenix Token", "Phoenix LP", "ECCU", 
                "Joule", "XP", "GOLD (42E0)", "RFOF", "RFOF/GOLD LP", "BIP", 
                "Identity Registry", "BRIDGE"
            ],

            async hash(string) {
                const utf8 = new TextEncoder().encode(string);
                const hashBuffer = await crypto.subtle.digest('SHA-256', utf8);
                const hashArray = Array.from(new Uint8Array(hashBuffer));
                return hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            },

            async login() {
                const user = document.getElementById('username').value;
                const pass = document.getElementById('password').value;
                if(!user || !pass) return;

                const timestamp = Date.now();
                const masterIdSuffix = await this.hash(user + timestamp);
                const masterId = `RFOF-NETWORK::${user.toUpperCase()}::EXT::${masterIdSuffix.substring(0,16)}`;

                this.user = {
                    username: user,
                    masterId: masterId,
                    xp: 0,
                    joule: 0,
                    level: 'AAA',
                    history: []
                };

                localStorage.setItem('pzqqet_session', JSON.stringify(this.user));
                this.initUI();
            },

            initUI() {
                document.getElementById('login-screen').style.display = 'none';
                document.getElementById('main-ui').style.display = 'block';
                document.getElementById('display-name').innerText = this.user.username.toUpperCase();
                document.getElementById('master-id').innerText = this.user.masterId;
                
                this.renderSectors();
                this.startEngine();
                this.log("GUCI STATUS: INITIALIZED. MASTER ID SECURED.");
            },

            renderSectors() {
                const grid = document.getElementById('master-grid');
                grid.innerHTML = '';
                this.sectors.forEach((s, i) => {
                    const box = document.createElement('div');
                    box.className = 'sektor-box';
                    box.id = `sektor-${i}`;
                    box.innerHTML = `
                        <div style="font-size:12px; font-weight:bold; letter-spacing:2px;">${s}</div>
                        <div class="dual-view">
                            <div class="view-pane" id="genesis-${i}">GENESIS:<br>HASHING...</div>
                            <div class="view-pane" id="sync-${i}">SYNC:<br>WAITING...</div>
                        </div>
                        <div class="diagram-layer" id="diagram-${i}"></div>
                    `;
                    grid.appendChild(box);
                });
            },

            startEngine() {
                setInterval(() => {
                    this.takt = (this.takt + 1) % 11;
                    this.updateUI();
                    if(this.takt === 0) this.triggerReset();
                    if(this.takt === 10) this.log("SINGULARITY INJECTION: ATTAINED.");
                }, 1000);

                // Joule Mining Simulation
                window.addEventListener('mousemove', () => {
                    this.user.xp += 0.01;
                    this.user.joule += 0.0001;
                });
            },

            updateUI() {
                document.getElementById('takt-val').innerText = this.takt;
                document.getElementById('takt-ring').style.transform = `rotate(${this.takt * 36}deg)`;
                
                // Pulsation
                const scale = 1 + (this.takt * 0.01);
                document.querySelectorAll('.sektor-box').forEach(el => {
                    el.style.transform = `scale(${scale})`;
                    // Update Diagrams
                    const diag = el.querySelector('.diagram-layer');
                    const candle = document.createElement('div');
                    candle.className = 'candle';
                    candle.style.height = `${Math.random() * 40 + 10}px`;
                    if(diag.children.length > 30) diag.removeChild(diag.firstChild);
                    diag.appendChild(candle);
                });
            },

            triggerReset() {
                const p = document.getElementById('reset-pulse');
                p.style.opacity = '1';
                setTimeout(() => p.style.opacity = '0', 100);
                this.log("ALPHA-NODES: RESET_PULSE EXECUTED.");
            },

            log(msg) {
                const out = document.getElementById('log-output');
                const line = document.createElement('div');
                line.innerText = `[${new Date().toISOString()}] ${msg}`;
                out.prepend(line);
            },

            toggleDropdown() {
                document.getElementById('user-dropdown').classList.toggle('active');
            },

            logout() {
                localStorage.removeItem('pzqqet_session');
                location.reload();
            }
        };

        // Auto-Login Check
        const session = localStorage.getItem('pzqqet_session');
        if(session) {
            APP.user = JSON.parse(session);
            APP.initUI();
        }
    </script>
</body>
</html>
