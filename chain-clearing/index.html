<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Chain-Clearing | Kachel J Explorer</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root { color-scheme: dark; --bg:#050505; --bg-alt:#0a0a0a; --border:#1f2937; --text:#f3f4f6; --j-color:#4ade80; --gold:#fbbf24; --eccu:#22c55e; --rfof:#38bdf8; }
    body { margin:0; font-family: 'Inter', sans-serif; background:var(--bg); color:var(--text); }
    header { padding:15px 20px; border-bottom:1px solid var(--border); background:#000; display:flex; justify-content:space-between; align-items:center; border-top: 3px solid var(--j-color); }
    main { padding:20px; max-width: 1200px; margin: 0 auto; }
    
    .search-bar { width:100%; background:var(--bg-alt); border:1px solid var(--border); border-radius:12px; padding:15px; display:flex; gap:10px; margin-bottom:25px; }
    .search-bar input { flex-grow:1; background:transparent; border:none; outline:none; color:var(--text); font-family:monospace; }
    
    .clearing-grid { display:grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap:20px; }
    .sector-node { background:var(--bg-alt); border:1px solid var(--border); border-radius:12px; padding:20px; position:relative; overflow:hidden; }
    .sector-node::before { content:''; position:absolute; top:0; left:0; width:100%; height:2px; opacity:0.5; }
    
    .node-gpcb::before { background:var(--gold); }
    .node-eccu::before { background:var(--eccu); }
    .node-rfof::before { background:var(--rfof); }
    
    .node-header { display:flex; justify-content:space-between; margin-bottom:15px; font-size:12px; font-weight:bold; }
    .data-stream { font-family:monospace; font-size:11px; color:#9ca3af; height:110px; overflow-y:auto; scrollbar-width: none; }
    .data-stream::-webkit-scrollbar { display: none; }

    .data-entry { display: block; cursor: pointer; padding: 4px 0; border-bottom: 1px solid rgba(31, 41, 55, 0.4); transition: 0.2s; }
    .data-entry:hover { color: var(--j-color); background: rgba(74, 222, 128, 0.05); }

    .bip-footer { position:fixed; bottom:0; left:0; right:0; background:#000; padding:10px 20px; border-top:1px solid var(--border); font-size:10px; color:var(--j-color); font-family:monospace; display:flex; justify-content:space-between; }
  </style>
</head>
<body>
<header>
  <div style="font-weight:bold; letter-spacing:1px;">KAHEL J | UNIVERSAL EXPLORER</div>
  <div style="font-size:11px; font-family:monospace;">API-GATEWAY: <span style="color:var(--j-color);">CONNECTED</span></div>
</header>

<main>
  <div class="search-bar">
    <span style="color:var(--j-color);">🔍</span>
    <input type="text" placeholder="Hash, Block, Profil-ID oder GUCI eingeben..." id="search-input">
  </div>

  <div class="clearing-grid">
    <div class="sector-node node-gpcb">
      <div class="node-header"><span style="color:var(--gold);">API: GPCB</span> <span id="gpcb-status">SYNC</span></div>
      <div class="data-stream" id="stream-gpcb"></div>
    </div>

    <div class="sector-node node-eccu">
      <div class="node-header"><span style="color:var(--eccu);">API: ECCU</span> <span id="eccu-status">SYNC</span></div>
      <div class="data-stream" id="stream-eccu"></div>
    </div>

    <div class="sector-node node-rfof">
      <div class="node-header"><span style="color:var(--rfof);">API: RFOF-GOLDEN</span> <span id="rfof-status">SYNC</span></div>
      <div class="data-stream" id="stream-rfof"></div>
    </div>
  </div>
</main>

<div class="bip-footer">
  <div>KAHEL-J-EXPLORER || OPERATIONAL-CENTER</div>
  <div id="clock">00:00:00</div>
</div>

<script>
  function updateClock() { document.getElementById('clock').textContent = new Date().toLocaleTimeString(); }
  setInterval(updateClock, 1000);
  
  setInterval(() => {
    const nodes = [
      { id: 'stream-gpcb', path: '../GPCB', color: '#fbbf24' },
      { id: 'stream-eccu', path: '../ECCU', color: '#22c55e' },
      { id: 'stream-rfof', path: '../RFOF-GOLDEN-Chain', color: '#38bdf8' }
    ];
    
    const target = nodes[Math.floor(Math.random() * nodes.length)];
    const el = document.getElementById(target.id);
    const hash = Math.random().toString(16).substring(2, 10).toUpperCase();
    
    const newEntry = document.createElement('div');
    newEntry.className = 'data-entry';
    newEntry.innerHTML = `> Block <span style="color:${target.color}">#${hash}</span> confirmed.`;
    
    // Pfad korrigiert: Springt aus chain-clearing raus in den jeweiligen Sektor
    newEntry.onclick = () => {
      window.location.href = `${target.path}/browser.html?block=${hash}`;
    };

    el.prepend(newEntry);
    if(el.children.length > 5) el.lastChild.remove();
  }, 4000);

  document.getElementById('search-input').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') window.location.href = `./browser.html?q=${this.value}`;
  });
</script>
</body>
</html>
