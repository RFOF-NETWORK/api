<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PZQQET | SOUVERÄNITÄTS-MONOLITH 1.0</title>
    <style>
        :root {
            --glass: rgba(255, 255, 255, 0.08);
            --glass-heavy: rgba(255, 255, 255, 0.12);
            --accent-blue: #0071e3;
            --prai-green: #32d74b;
            --text-main: #f5f5f7;
            --bg-black: #000000;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg-black);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 00 HEADER: GLASSMORPHISM */
        header {
            position: fixed;
            top: 0; width: 100%; height: 64px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 0.5px solid rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 40px;
            z-index: 1000;
        }

        .logo { font-weight: 700; font-size: 20px; letter-spacing: -0.5px; }
        .search-bar {
            background: rgba(255,255,255,0.1);
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            color: white;
            width: 300px;
        }

        /* 00-A PROFIL-SOUVERÄN */
        .profile-souveran {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .avatar {
            width: 32px; height: 32px;
            background: linear-gradient(135deg, var(--accent-blue), var(--prai-green));
            border-radius: 50%;
            border: 1px solid var(--glass-heavy);
        }

        /* 01 INTERFACE-SEKTOR & KACHEL-KASKADE */
        main {
            margin-top: 64px;
            padding: 40px;
            flex-grow: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 24px;
            overflow-y: auto;
        }

        /* 02 KACHEL NULL: DAS HERZ */
        .kachel-null {
            grid-column: 1 / -1;
            height: 400px;
            background: radial-gradient(circle at center, rgba(0,113,227,0.15) 0%, transparent 70%);
            border: 1px solid var(--accent-blue);
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .punkt-e {
            font-size: 80px; font-weight: 800;
            background: linear-gradient(to bottom, #fff, #666);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .takt-indicator {
            position: absolute; bottom: 20px;
            display: flex; gap: 8px;
        }
        .takt-dot { width: 12px; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; }
        .takt-dot.active { background: var(--prai-green); box-shadow: 0 0 10px var(--prai-green); }

        /* SEKTOREN 03-11: DUAL-KACHELN */
        .sector-tile {
            background: var(--glass);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 24px;
            min-height: 220px;
            transition: transform 0.3s ease;
            position: relative;
        }
        .sector-tile:hover { transform: scale(1.02); background: var(--glass-heavy); }
        
        .status-layer {
            position: absolute; top: 15px; right: 15px;
            font-size: 10px; font-weight: 700; letter-spacing: 1px;
        }

        .status-1 { color: #888; } /* Idle */
        .status-2 { color: var(--accent-blue); } /* Syncing */
        .status-3 { color: var(--prai-green); } /* Verified */

        .price-axiom { font-size: 24px; font-weight: 600; margin-top: 10px; }

        /* 04 NEWS-FEED: FIXIERTER BODEN */
        footer {
            height: 50px;
            background: rgba(0,0,0,0.8);
            border-top: 0.5px solid var(--glass-border);
            display: flex;
            align-items: center;
            padding: 0 40px;
            font-size: 12px;
            color: #86868b;
            z-index: 1000;
        }

        .news-ticker { overflow: hidden; white-space: nowrap; }
    </style>
</head>
<body>

<header>
    <div class="logo">PZQQET 1.0</div>
    <input type="text" class="search-bar" placeholder="Souveränitäts-Suche...">
    <div class="profile-souveran">
        <span>@RFOF-NETWORK</span>
        <div class="avatar"></div>
    </div>
</header>

<main id="monolith-grid">
    <section class="kachel-null">
        <div class="status-layer status-3">PZQQET_CORE_SYNC: ACTIVE</div>
        <div class="punkt-e">E (6.5)</div>
        <div style="font-size: 14px; opacity: 0.6;">42E0-TAKTFREQUENZ</div>
        <div class="takt-indicator" id="takt-engine">
            </div>
    </section>

    </main>

<footer>
    <div class="news-ticker" id="gt-publisher">
        [TAKT 10] SINGULARITÄT ERREICHT: Alle 65 Dateien notarisiert. +++ RFOF-GOLDEN CHAIN stabil bei 100.000.000% +++ 
    </div>
</footer>

<script>
    // Mechatronische Takt-Steuerung (0-10)
    const taktEngine = document.getElementById('takt-engine');
    for (let i = 0; i <= 10; i++) {
        const dot = document.createElement('div');
        dot.className = 'takt-dot';
        dot.id = `takt-${i}`;
        taktEngine.appendChild(dot);
    }

    let currentTakt = 0;
    setInterval(() => {
        document.querySelectorAll('.takt-dot').forEach(d => d.classList.remove('active'));
        document.getElementById(`takt-${currentTakt}`).classList.add('active');
        currentTakt = (currentTakt + 1) % 11;
    }, 1000);

    // Kommunikation mit browser.html
    window.addEventListener('message', (event) => {
        // Hier werden die operativen Daten der browser.html empfangen und gerendert
        console.log("Empfange Mechatronik-Daten:", event.data);
        if(event.data.type === 'UPDATE_SECTOR') {
            updateSectorDisplay(event.data.payload);
        }
    });

    function updateSectorDisplay(data) {
        // Logik zur Aktualisierung der 13 dualen Kacheln
    }
</script>
</body>
</html>
