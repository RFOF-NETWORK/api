<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>Admin-Docs | Master Terminal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    :root { color-scheme: dark; --bg:#000; --text:#ef4444; --border:#334155; }
    body { margin:0; font-family: 'Courier New', monospace; background:var(--bg); color:var(--text); padding:20px; }
    .terminal { border:1px solid var(--border); border-radius:8px; padding:20px; height: calc(100vh - 40px); overflow-y:auto; border-right: 3px solid var(--text); }
    .line { margin-bottom:8px; font-size:12px; }
    .sys { color:#f1f5f9; }
    .highlight { color:#fbbf24; }
  </style>
</head>
<body>
<div class="terminal" id="term">
  <div class="line">[ADMIN-OS] Initializing Master Command Layer...</div>
  <div class="line">[INFO] Dual-View enabled: Mapping User-Actions to Dev-Logs.</div>
  <div class="line">[INFO] 100M% Win-Rate Algorithm: CALIBRATING.</div>
  <div class="line">--------------------------------------------------</div>
  <div class="line sys">ADMIN:\MASTER\> <span style="animation: blink 1s infinite;">_</span></div>
</div>

<script>
  const term = document.getElementById("term");
  function addLog(msg) {
    const div = document.createElement("div");
    div.className = "line";
    div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
    term.insertBefore(div, term.lastElementChild);
    term.scrollTop = term.scrollHeight;
  }

  // Admin-Log Simulation (Verknüpfung beider Welten)
  setInterval(() => {
    if(Math.random() > 0.8) {
      addLog("<span class='highlight'>MASTER-SYNC:</span> User interaction verified via Dev-API (ECCU-V1).");
    }
  }, 5000);
</script>
<style> @keyframes blink { 50% { opacity:0; } } </style>
</body>
</html>
