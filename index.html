<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>RFOF API Index</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin:0; font-family:system-ui, -apple-system, sans-serif; background:#05060a; color:#f5f5f5; }
    header { padding:12px 16px; border-bottom:1px solid #222; display:flex; align-items:center; justify-content:space-between; }
    .brand { font-weight:600; letter-spacing:0.04em; font-size:14px; text-transform:uppercase; color:#9ca3af; }
    .dropdown { position:relative; }
    .dropdown-button {
      background:#111827; color:#e5e7eb; border:1px solid #374151;
      padding:6px 10px; border-radius:6px; font-size:13px;
      display:flex; align-items:center; gap:6px; cursor:pointer;
    }
    .dropdown-button span.label { text-transform:uppercase; letter-spacing:0.06em; font-size:11px; color:#9ca3af; }
    .dropdown-menu {
      position:absolute; top:100%; left:0; margin-top:4px;
      background:#020617; border:1px solid #1f2937; border-radius:8px;
      min-width:220px; max-height:320px; overflow:auto; padding:4px 0;
      box-shadow:0 18px 40px rgba(0,0,0,0.65); z-index:20; display:none;
    }
    .dropdown-item {
      padding:7px 12px; font-size:13px; display:flex; flex-direction:column;
      gap:2px; cursor:pointer;
    }
    .dropdown-item:hover { background:#0b1120; }
    .dropdown-item-title { font-weight:500; color:#e5e7eb; text-transform:capitalize; }
    .dropdown-item-sub { font-size:11px; color:#6b7280; text-transform:uppercase; letter-spacing:0.08em; }
    main { padding:16px; }
    .module-title { font-size:18px; font-weight:600; margin-bottom:4px; text-transform:capitalize; }
    .module-sub { font-size:11px; color:#9ca3af; text-transform:uppercase; letter-spacing:0.12em; margin-bottom:16px; }
    .pill-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:18px; }
    .pill {
      font-size:11px; padding:4px 8px; border-radius:999px;
      border:1px solid #1f2937; color:#9ca3af; text-transform:uppercase; letter-spacing:0.08em;
    }
    .grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:10px; }
    .card {
      border-radius:10px; border:1px solid #111827; background:#020617;
      padding:10px 11px; display:flex; flex-direction:column; gap:4px;
    }
    .card-title { font-size:12px; font-weight:500; color:#e5e7eb; text-transform:uppercase; letter-spacing:0.08em; }
    .card-sub { font-size:11px; color:#6b7280; }
    .muted { color:#6b7280; font-size:11px; }
  </style>
</head>
<body>
<header>
  <div class="brand">RFOF · API</div>
  <div class="dropdown">
    <button class="dropdown-button" id="moduleDropdownButton">
      <span class="label">Module</span>
      <span id="moduleDropdownCurrent">–</span>
      <span>▾</span>
    </button>
    <div class="dropdown-menu" id="moduleDropdownMenu"></div>
  </div>
</header>

<main>
  <div id="moduleView">
    <!-- dynamic -->
  </div>
</main>

<script>
  // --- 1. Repo-Module (aus /api) ---
  const REPO_MODULES = [
    "accounts",
    "clearing",
    "compliance",
    "config",
    "docs",
    "documents",
    "federation",
    "identity",
    "ledger",
    "liquidity",
    "scripts",
    "settlement",
    "shared",
    "tests",
    "treasury"
  ];

  // --- 2. Technische Module (Ausschlussliste) ---
  const TECHNICAL_MODULES = new Set([
    "config",
    "docs",
    "scripts",
    "shared",
    "tests"
  ]);

  // --- 3. UI-Module = Repo-Module – technische Module ---
  const UI_MODULES = REPO_MODULES.filter(m => !TECHNICAL_MODULES.has(m));

  // --- 4. Hilfsfunktionen ---
  function capitalizeName(name) {
    return name.charAt(0).toUpperCase() + name.slice(1);
  }

  function moduleDescriptor(name) {
    return {
      id: name,
      label: capitalizeName(name),
      kind: "API Module"
    };
  }

  function renderModuleDropdown() {
    const menu = document.getElementById("moduleDropdownMenu");
    menu.innerHTML = "";
    UI_MODULES
      .map(moduleDescriptor)
      .forEach(mod => {
        const item = document.createElement("div");
        item.className = "dropdown-item";
        item.dataset.moduleId = mod.id;
        item.innerHTML = `
          <div class="dropdown-item-title">${mod.label}</div>
          <div class="dropdown-item-sub">${mod.kind}</div>
        `;
        item.addEventListener("click", () => {
          selectModule(mod.id);
          menu.style.display = "none";
        });
        menu.appendChild(item);
      });
  }

  function renderModuleView(moduleId) {
    const container = document.getElementById("moduleView");
    const label = capitalizeName(moduleId);

    container.innerHTML = `
      <div class="module-title">${label}</div>
      <div class="module-sub">API MODULE · ${moduleId}</div>

      <div class="pill-row">
        <span class="pill">Resources</span>
        <span class="pill">Actions</span>
        <span class="pill">Events</span>
        <span class="pill">Schemas</span>
      </div>

      <div class="grid">
        <div class="card">
          <div class="card-title">Resources</div>
          <div class="card-sub">All resource definitions for this module.</div>
        </div>
        <div class="card">
          <div class="card-title">Actions</div>
          <div class="card-sub">Executable operations exposed by this module.</div>
        </div>
        <div class="card">
          <div class="card-title">Events</div>
          <div class="card-sub">Domain events emitted by this module.</div>
        </div>
        <div class="card">
          <div class="card-title">Schemas</div>
          <div class="card-sub">Validation and data contracts for this module.</div>
        </div>
      </div>

      <p class="muted" style="margin-top:14px;">
        Module is UI-visible because it exists in the API repo and is not in the technical exclusion set.
      </p>
    `;
  }

  function selectModule(moduleId) {
    const current = document.getElementById("moduleDropdownCurrent");
    current.textContent = capitalizeName(moduleId);
    renderModuleView(moduleId);
  }

  // --- 5. Dropdown-Interaktion ---
  (function init() {
    const btn = document.getElementById("moduleDropdownButton");
    const menu = document.getElementById("moduleDropdownMenu");

    btn.addEventListener("click", () => {
      menu.style.display = menu.style.display === "block" ? "none" : "block";
    });

    document.addEventListener("click", (e) => {
      if (!btn.contains(e.target) && !menu.contains(e.target)) {
        menu.style.display = "none";
      }
    });

    renderModuleDropdown();

    if (UI_MODULES.length > 0) {
      selectModule(UI_MODULES[0]);
    } else {
      document.getElementById("moduleDropdownCurrent").textContent = "None";
      document.getElementById("moduleView").innerHTML =
        '<p class="muted">No UI modules available.</p>';
    }
  })();
</script>
</body>
</html>
