<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>RFOF-NETWORK – API</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body { margin:0; font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif; background:#0a0a0a; color:#f5f5f5; }
    header { padding:20px; border-bottom:1px solid #222; background:#0a0a0a; }
    h1 { margin:0; font-size:22px; }
    #container { padding:20px; }
    .module { padding:16px; border:1px solid #222; border-radius:8px; margin-bottom:12px; background:#111; cursor:pointer; }
    .module:hover { background:#1a1a1a; }
    .title { font-size:20px; margin-bottom:6px; }
    .meta { font-size:12px; color:#aaa; margin-bottom:10px; }
    .block { padding:12px; border-radius:8px; border:1px solid #222; background:#111; margin-top:10px; }
    .back { margin-bottom:20px; display:inline-block; }
  </style>
</head>
<body>

<header>
  <h1>RFOF-NETWORK – API</h1>
</header>

<div id="container">
  <div id="content">Lade API…</div>
</div>

<script>
// Repo-Konfiguration
const owner = "RFOF-NETWORK";
const repo = "api";
const apiBase = `https://api.github.com/repos/${owner}/${repo}/contents`;

// Dateiname → Modulname
function normalizeModule(name) {
  return name
    .replace(/[_-]/g, " ")
    .replace(/\s+/g, " ")
    .trim()
    .replace(/\b\w/g, c => c.toUpperCase());
}

// Dateityp → Funktion
function functionalType(path) {
  if (path.endsWith(".md")) return "Dokumentation";
  if (path.endsWith(".sql")) return "Regeln / Validierungen / Constraints";
  if (path.endsWith(".json")) return "Schema / Strukturdefinition";
  if (path.endsWith(".yaml") || path.endsWith(".yml")) return "Konfiguration";
  if (path.endsWith(".txt")) return "Beschreibung";
  if (path.endsWith(".js")) return "Logik / Script";
  return "Ressource";
}

// API laden → Module extrahieren
async function loadAPI() {
  const res = await fetch(apiBase);
  const root = await res.json();

  const modules = root.filter(item => item.type === "dir");

  const content = document.getElementById("content");
  content.innerHTML = "";

  for (const mod of modules) {
    const moduleName = normalizeModule(mod.name);

    const moduleDiv = document.createElement("div");
    moduleDiv.className = "module";
    moduleDiv.innerHTML = `
      <div class="title">${moduleName}</div>
      <div class="meta">API‑Modul</div>
    `;
    moduleDiv.onclick = () => loadModule(mod.path, moduleName);

    content.appendChild(moduleDiv);
  }
}

// Modul laden → Funktionen extrahieren
async function loadModule(path, moduleName) {
  const res = await fetch(`${apiBase}/${path}`);
  const files = await res.json();

  const content = document.getElementById("content");
  content.innerHTML = `
    <a class="back" href="#" onclick="loadAPI()">← Zurück zur API</a>
    <div class="title">${moduleName}</div>
    <div class="meta">Modul‑Definition</div>
  `;

  files.forEach(file => {
    if (file.type !== "file") return;

    const funcName = normalizeModule(file.name.replace(/\.[^/.]+$/, ""));
    const funcType = functionalType(file.name);

    const block = document.createElement("div");
    block.className = "block";
    block.innerHTML = `
      <b>${funcName}</b><br>
      <span style="color:#aaa">${funcType}</span>
    `;

    content.appendChild(block);
  });
}

// Startseite = API‑Übersicht
loadAPI();
</script>

</body>
</html>
