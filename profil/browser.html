<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>RFOF‑NETWORK | Messenger Terminal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { color-scheme: dark; --bg:#05060a; --bg-alt:#0f1117; --border:#1f2933; --text:#f9fafb; --accent:#38bdf8; }
    body { margin:0; font-family:monospace; background:var(--bg); color:var(--text); display:flex; flex-direction:column; height:100vh; }
    
    header { padding:15px; border-bottom:1px solid var(--border); background:#020308; display:flex; justify-content:space-between; }
    
    #message-flow { flex:1; padding:20px; overflow-y:auto; display:flex; flex-direction:column; gap:10px; }
    .msg-bubble { max-width:80%; padding:12px; border-radius:10px; font-size:13px; border:1px solid var(--border); }
    .msg-in { align-self:flex-start; background:var(--bg-alt); }
    .msg-out { align-self:flex-end; background:rgba(56,189,248,0.1); border-color:var(--accent); }
    
    .subject-lock { background:#1a0000; color:#ff6b6b; padding:5px 10px; border-radius:4px; font-size:11px; margin-bottom:5px; border:1px solid #4d0000; }

    .input-box { padding:20px; border-top:1px solid var(--border); background:var(--bg-alt); }
    .script-input { width:100%; background:#000; border:1px solid var(--border); color:var(--text); padding:12px; border-radius:6px; font-family:monospace; margin-bottom:10px; }
    .btn-send { background:var(--accent); color:#000; border:none; padding:10px 25px; border-radius:4px; font-weight:bold; cursor:pointer; width:100%; }
  </style>
</head>
<body>

<header>
  <div><b>MSG-TERM / SCRIPT-REQUEST</b></div>
  <div style="color:var(--accent);" id="guci-display">GUCI-INIT</div>
</header>

<div id="message-flow">
  <div class="msg-bubble msg-in">
    <div class="subject-lock">BETREFF-ZWANG: SYSTEM-ABFRAGE</div>
    Willkommen im verschlüsselten Messenger. Jede Nachricht erfordert eine Skript-Anfrage zur Validierung.
  </div>
</div>

<div class="input-box">
  <input type="text" id="subject-field" class="script-input" placeholder="Betreff (Zwingend erforderlich)..." style="height:40px;">
  <textarea id="msg-content" class="script-input" rows="3" placeholder="Ihre Nachricht als Skript-Anfrage..."></textarea>
  <button class="btn-send" onclick="sendScriptRequest()">ANFRAGE SENDEN (+2 Joul)</button>
</div>

<script>
  document.getElementById("guci-display").textContent = localStorage.getItem("globalClientID");

  function sendScriptRequest() {
    const subj = document.getElementById("subject-field").value;
    const msg = document.getElementById("msg-content").value;
    
    if(!subj || !msg) {
      alert("FEHLER: Betreff und Nachricht dürfen nicht leer sein.");
      return;
    }

    const flow = document.getElementById("message-flow");
    const newMsg = document.createElement("div");
    newMsg.className = "msg-bubble msg-out";
    newMsg.innerHTML = `<div class="subject-lock" style="color:var(--accent); border-color:var(--accent);">BETREFF: ${subj}</div>${msg}`;
    
    flow.appendChild(newMsg);
    flow.scrollTop = flow.scrollHeight;
    
    // Energie-Logik aus DNA
    let energy = parseInt(localStorage.getItem("totalJoul") || "0");
    localStorage.setItem("totalJoul", energy + 2);
    
    document.getElementById("subject-field").value = "";
    document.getElementById("msg-content").value = "";
    
    console.log("Script-Request via GUCI gesendet.");
  }
</script>
</body>
</html>
