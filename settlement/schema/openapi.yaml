openapi: 3.1.0
info:
  title: Settlement Module API
  version: 1.0.0
  description: >
    OpenAPI-Spezifikation für das Settlement-Modul.
    Dieses Modul umfasst Settlement-Accounts, Settlement-Positions,
    Settlement-Flows sowie deterministische Settlement-Aktionen.
    Die Struktur ist stabil, auditierbar und vollständig
    kompatibel mit regulatorischen Anforderungen.

paths:

  /rpc/settlement_create_settlement_account:
    post:
      summary: Neuen Settlement-Account erzeugen
      operationId: settlement_create_settlement_account
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                in_account_type:
                  type: string
                in_currency:
                  type: string
                in_treasury_account_id:
                  type: string
                  format: uuid
                in_liquidity_pool_id:
                  type: string
                  format: uuid
                in_metadata:
                  type: object
              required:
                - in_account_type
                - in_currency
      responses:
        '200':
          description: ID des erzeugten Settlement-Accounts
          content:
            application/json:
              schema:
                type: string
                format: uuid

  /rpc/settlement_record_settlement_flow:
    post:
      summary: Settlement-Flow erfassen (credit/debit)
      operationId: settlement_record_settlement_flow
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                in_settlement_account_id:
                  type: string
                  format: uuid
                in_direction:
                  type: string
                in_amount:
                  type: number
                in_currency:
                  type: string
                in_metadata:
                  type: object
              required:
                - in_settlement_account_id
                - in_direction
                - in_amount
                - in_currency
      responses:
        '200':
          description: ID des erzeugten Settlement-Flows
          content:
            application/json:
              schema:
                type: string
                format: uuid

  /rpc/settlement_reconcile_settlement_positions:
    post:
      summary: Settlement-Position rekonsolidieren
      operationId: settlement_reconcile_settlement_positions
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                in_settlement_account_id:
                  type: string
                  format: uuid
                in_currency:
                  type: string
                in_metadata:
                  type: object
              required:
                - in_settlement_account_id
                - in_currency
      responses:
        '200':
          description: ID der neuen Settlement-Position
          content:
            application/json:
              schema:
                type: string
                format: uuid

components:

  schemas:

    SettlementAccount:
      type: object
      properties:
        id:
          type: string
          format: uuid
        settlement_account_number:
          type: integer
        account_type:
          type: string
        treasury_account_id:
          type: string
          format: uuid
        liquidity_pool_id:
          type: string
          format: uuid
        currency:
          type: string
        active:
          type: boolean
        created_at:
          type: string
          format: date-time
        metadata:
          type: object

    SettlementPosition:
      type: object
      properties:
        id:
          type: string
          format: uuid
        settlement_account_id:
          type: string
          format: uuid
        currency:
          type: string
        balance:
          type: number
        reserved_balance:
          type: number
        available_balance:
          type: number
        created_at:
          type: string
          format: date-time
        metadata:
          type: object

    SettlementFlow:
      type: object
      properties:
        id:
          type: string
          format: uuid
        settlement_account_id:
          type: string
          format: uuid
        direction:
          type: string
        amount:
          type: number
        currency:
          type: string
        occurred_at:
          type: string
          format: date-time
        metadata:
          type: object  type: object
