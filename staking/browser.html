<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>RFOF‑NETWORK | Staking Terminal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root { color-scheme: dark; --bg:#05060a; --bg-alt:#0f1117; --border:#1f2933; --text:#f9fafb; --accent:#38bdf8; }
    body { margin:0; font-family:monospace; background:var(--bg); color:var(--text); padding:20px; }
    header { border-bottom:1px solid var(--border); padding-bottom:10px; margin-bottom:20px; display:flex; justify-content:space-between; }
    .monitor-grid { display:grid; grid-template-columns: 1fr 1fr; gap:20px; }
    .log-box { background:#000; border:1px solid var(--border); border-radius:8px; padding:15px; height:450px; overflow-y:auto; }
    .log-entry { font-size:11px; margin-bottom:6px; border-bottom:1px solid rgba(255,255,255,0.03); padding-bottom:2px; }
    .highlight { color:var(--accent); }
    .success { color:#4ade80; }
    input { width:100%; background:var(--bg-alt); border:1px solid var(--border); color:var(--text); padding:10px; border-radius:4px; font-family:monospace; margin-top:10px; }
  </style>
</head>
<body>

<header>
  <b>STAKING-TERM / ENERGIE-LOGS</b>
  <div id="guci-val" style="color:var(--accent);">GUCI-SYNC</div>
</header>

<div class="monitor-grid">
  <div>
    <div style="font-size:10px; color:var(--muted); margin-bottom:5px;">LIVE ENERGY VALIDATION</div>
    <div class="log-box" id="energy-logs">
      <div class="log-entry highlight">[INIT] Staking-Node an GUCI gekoppelt.</div>
      <div class="log-entry">[INFO] Warte auf TX-Validierung für 0,2% Preissteigerung...</div>
    </div>
  </div>

  <div>
    <div style="font-size:10px; color:var(--muted); margin-bottom:5px;">FORGE REGISTRY (SHA256)</div>
    <div class="log-box" id="nft-logs">
      <div class="log-entry success">[REG] Genesis-Asset #0001 (RFOF-MASTER)</div>
    </div>
  </div>
</div>

<input type="text" id="cmd" placeholder="Kommando: /sync-pool, /boost-energy, /verify-nft" onkeydown="if(event.key==='Enter') exec()">

<script>
  document.getElementById("guci-val").textContent = localStorage.getItem("globalClientID");

  function addLog(boxId, msg, className = "") {
    const box = document.getElementById(boxId);
    const div = document.createElement("div");
    div.className = "log-entry " + className;
    div.innerHTML = `[${new Date().toLocaleTimeString()}] ${msg}`;
    box.prepend(div);
  }

  function exec() {
    const cmd = document.getElementById("cmd").value;
    addLog("energy-logs", `> EXECUTING: ${cmd}`, "highlight");

    if(cmd === "/sync-pool") {
      addLog("energy-logs", "Pool-Daten mit GPCB-Sektor abgeglichen. 45% SAFE-Bestand verifiziert.", "success");
    } else if(cmd === "/verify-nft") {
      addLog("nft-logs", "Validating SVG-Hash: " + Math.random().toString(16).slice(2,15), "highlight");
      addLog("nft-logs", "NFT-STATUS: VALIDATED", "success");
    } else {
      addLog("energy-logs", "ERROR: Befehl nicht gefunden.", "highlight");
    }
    document.getElementById("cmd").value = "";
  }

  // Automatischer Monitor-Feed
  setInterval(() => {
    if(Math.random() > 0.8) {
      addLog("energy-logs", "Incoming Energy-Pulse: +1.2 Joul (Node Sync)");
    }
  }, 5000);
</script>
</body>
</html>
